// ── رفع صورة لـ Imgur (بديل Firebase Storage إذا واجه مشاكل) ──
// نستخدم Firebase Storage مع timeout واضح
async function uploadImage(file,path){
  return new Promise(async(resolve,reject)=>{
    try{
      // تحويل الصورة لـ base64 أولاً كبديل آمن
      const reader=new FileReader();
      reader.onload=async(e)=>{
        try{
          const ref=storage.ref(path);
          const snap=await ref.put(file);
          const url=await snap.ref.getDownloadURL();
          resolve(url);
        }catch(err){
          // إذا فشل Storage نستخدم base64 مباشرة
          resolve(e.target.result);
        }
      };
      reader.onerror=()=>reject(new Error("فشل قراءة الملف"));
      reader.readAsDataURL(file);
    }catch(e){reject(e);}
  });
}

function QR({value,size=190}){
  const ref=useRef();
  useEffect(()=>{if(!value||!ref.current)return;ref.current.innerHTML="";if(window.QRCode)new window.QRCode(ref.current,{text:value,width:size,height:size,colorDark:"#1a0533",colorLight:"#fff"});},[value]);
  return <div ref={ref} style={{display:"inline-block"}}/>;
}

function Certificate({student,teacherName,onClose}){
  const certRef=useRef();
  const print=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><meta charset="UTF-8"><style>body{font-family:'Cairo',sans-serif;direction:rtl;background:#0a0118;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap')</style></head><body>${certRef.current.innerHTML}</body></html>`);
    w.document.close(); w.focus(); setTimeout(()=>{w.print();w.close();},800);
  };
  const save=()=>{
    if(!certRef.current) return;
    import("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js").then(()=>{
      window.html2canvas(certRef.current,{backgroundColor:"#0a0118"}).then(canvas=>{
        const a=document.createElement("a"); a.download=`شهادة_${student.name}.png`; a.href=canvas.toDataURL(); a.click();
      });
    }).catch(()=>print());
  };
  return(
    <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"560px"}}>
        <div className="fl ac jb mb16 no-print">
          <div className="sec" style={{marginBottom:0}}>🏆 شهادة التميز</div>
          <button className="btn bs bsm" onClick={onClose}>✕</button>
        </div>
        <div ref={certRef} className="cert">
          <div style={{fontSize:"2.5rem",marginBottom:"8px"}}>🏆</div>
          <div className="cert-title">شهادة تقدير وتميز</div>
          <div style={{height:"2px",background:"linear-gradient(90deg,transparent,#f59e0b,transparent)",margin:"16px 0"}}/>
          <div style={{fontSize:".85rem",color:"#9d8ab5",marginBottom:"8px"}}>تُمنح هذه الشهادة للطالب المتميز</div>
          <div style={{fontSize:"2rem",fontWeight:900,color:"#f1e8ff",margin:"12px 0"}}>{student.name}</div>
          <div style={{fontSize:".9rem",color:"#9d8ab5",marginBottom:"12px"}}>لتحقيقه</div>
          <div style={{fontSize:"2.5rem",fontWeight:900,color:"#f59e0b",marginBottom:"4px"}}>{student.points||0} ⭐</div>
          <div style={{fontSize:".85rem",color:"#9d8ab5",marginBottom:"16px"}}>نقطة تعليمية في منصة كون</div>
          <div style={{height:"1px",background:"linear-gradient(90deg,transparent,#2d1660,transparent)",margin:"16px 0"}}/>
          <div style={{fontSize:".85rem",color:"#a855f7",marginBottom:"4px"}}>المعلم / {teacherName}</div>
          <div style={{fontSize:".75rem",color:"#9d8ab5"}}>منصة كون التعليمية — {new Date().toLocaleDateString("ar-SA")}</div>
        </div>
        <div className="fl g8 mt16 no-print" style={{justifyContent:"center"}}>
          <button className="btn bp bsm" onClick={print}>🖨 طباعة</button>
          <button className="btn bgold bsm" onClick={save}>💾 حفظ كصورة</button>
        </div>
      </div>
    </div>
  );
}

function StudentReport({student,classId,contentList,onClose,onIssueCert,teacherName}){

  const [loading,setL]=useState(true);
  const [showCert,setShowCert]=useState(false);

  useEffect(()=>{
    db.collection("classrooms").doc(classId).collection("submissions")
      .where("studentId","==",student.studentId||student.id).get()
      .then(s=>{setSubs(s.docs.map(d=>({id:d.id,...d.data()})));setL(false);});
  },[]);

  const getContent=cid=>contentList.find(c=>c.id===cid);
  const typeLabel={post:"منشور 📢",video:"فيديو 🎬",homework:"واجب 📝",task:"مهمة 📋"};
  const statusLabel={pending:"قيد المراجعة ⏳",approved:"مقبولة ✅",rejected:"مرفوضة ✕"};

    window.print();
  };

  return(<>

      <div className="modal" style={{maxWidth:"620px"}}>

        </div>

        :subs.length===0?<div className="card tc" style={{padding:"24px"}}><div className="mu sm">لم يُنجز أي نشاط بعد</div></div>

        </div>

  </>);
}

  const getName=sid=>{const st=students.find(s=>s.studentId===sid||s.id===sid);return st?st.name:"طالب";};

  const approve=async(sub,p)=>{
    const sc=Number(p)||0;
    await db.collection("classrooms").doc(classId).collection("submissions").doc(sub.id).update({status:"approved",score:sc,pts:sc});
    if(sc>0){
      await db.collection("users").doc(sub.studentId).update({points:FS.increment(sc)});
      await db.collection("classrooms").doc(classId).collection("students").doc(sub.studentId).update({points:FS.increment(sc)});
    }
    setSubs(s=>s.map(x=>x.id===sub.id?{...x,status:"approved",score:sc}:x));
    show(`✅ تم قبول المهمة ومنح ${sc} نقطة`);
  };

  const reject=async(sub)=>{
    await db.collection("classrooms").doc(classId).collection("submissions").doc(sub.id).update({status:"rejected"});
    setSubs(s=>s.map(x=>x.id===sub.id?{...x,status:"rejected"}:x));
    show("تم رفض المهمة","error");
  };

  return(
    <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"580px"}}>
        <div className="fl ac jb mb16">
          <div className="sec" style={{marginBottom:0}}>📋 مراجعة: {item.title}</div>
          <button className="btn bs bsm" onClick={onClose}>✕</button>
        </div>
        {loading?<div className="fl jc" style={{padding:"28px"}}><Sp/></div>
        :subs.length===0?<div className="tc" style={{padding:"28px"}}><div style={{fontSize:"2rem"}}>📭</div><div className="mu sm mt8">لا توجد تسليمات بعد</div></div>
        :subs.map(sub=>(
          <div key={sub.id} className="card mb8" style={{padding:"13px",background:C.hi}}>
            <div className="fl ac jb mb8">
              <div className="fl ac g8">
                <div className="av" style={{width:32,height:32,fontSize:".8rem"}}>{getName(sub.studentId)[0]}</div>
                <div className="bo2 sm">{getName(sub.studentId)}</div>
              </div>
              <span className={`badge ${sub.status==="approved"?"bappr":sub.status==="rejected"?"brej":"bpend"}`}>
                {sub.status==="approved"?"✅ مقبولة":sub.status==="rejected"?"✕ مرفوضة":"⏳ قيد المراجعة"}
              </span>
            </div>
            {sub.imageUrl&&<img src={sub.imageUrl} style={{width:"100%",maxHeight:"280px",objectFit:"contain",borderRadius:"8px",marginBottom:"10px"}} alt="مهمة"/>}
            {sub.note&&<div className="sm mu mb8">💬 {sub.note}</div>}
            {(!sub.status||sub.status==="pending")&&(
              <div className="fl ac g8 mt8">
                <input className="inp" type="number" placeholder={`النقاط (أقصى ${item.totalPoints||item.points||10})`}
                  value={pts[sub.id]||""} onChange={e=>setPts(p=>({...p,[sub.id]:e.target.value}))} style={{flex:1}}/>
                <button className="btn bg bsm" onClick={()=>approve(sub,pts[sub.id]||item.totalPoints||item.points||10)}>✅ قبول</button>
                <button className="btn br bsm" onClick={()=>reject(sub)}>✕ رفض</button>
              </div>
            )}
            {sub.status==="approved"&&<div className="xs mu mt4">✅ منحت {sub.score} نقطة</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  كشف الدرجات
// ══════════════════════════════════════════════════════
function GradesSheet({classId,students,onClose}){
  const [subs,setSubs]=useState([]);
  const [cnt,setCnt]=useState([]);
  const [loading,setL]=useState(true);
  const [ed,setEd]=useState(null);
  const [ev,setEv]=useState("");
  useEffect(()=>{
    (async()=>{
      const [cS,sS]=await Promise.all([
        db.collection("classrooms").doc(classId).collection("content").where("type","==","homework").get(),
        db.collection("classrooms").doc(classId).collection("submissions").get(),
      ]);
      setCnt(cS.docs.map(d=>({id:d.id,...d.data()})));
      setSubs(sS.docs.map(d=>({id:d.id,...d.data()})));
      setL(false);
    })();
  },[]);
  const getScore=(sid,cid)=>{const s=subs.find(x=>x.studentId===sid&&x.contentId===cid);return s?(s.score??s.pts??null):null;};
  const save=async(sid,cid)=>{
    const score=Number(ev);
    const ex=subs.find(x=>x.studentId===sid&&x.contentId===cid);
    if(ex){await db.collection("classrooms").doc(classId).collection("submissions").doc(ex.id).update({score});setSubs(s=>s.map(x=>x.id===ex.id?{...x,score}:x));}
    else{const ref=await db.collection("classrooms").doc(classId).collection("submissions").add({studentId:sid,contentId:cid,score,manualEdit:true});setSubs(s=>[...s,{id:ref.id,studentId:sid,contentId:cid,score}]);}
    setEd(null);
  };
  return(
    <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"700px"}}>
        <div className="fl ac jb mb16"><div className="sec" style={{marginBottom:0}}>📊 كشف الدرجات</div><button className="btn bs bsm" onClick={onClose}>✕</button></div>
        {loading?<div className="fl jc" style={{padding:"28px"}}><Sp/></div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:".8rem"}}>
              <thead><tr>
                <th style={{padding:"8px",textAlign:"right",color:C.mut,borderBottom:`1px solid ${C.border}`,minWidth:"95px"}}>الطالب</th>
                {cnt.map(c=><th key={c.id} style={{padding:"8px",textAlign:"center",color:C.glow,borderBottom:`1px solid ${C.border}`,minWidth:"75px"}}>{c.title}<br/><span style={{color:C.mut,fontWeight:400}}>/{c.totalPoints}</span></th>)}
                <th style={{padding:"8px",textAlign:"center",color:C.gold,borderBottom:`1px solid ${C.border}`}}>المجموع</th>
              </tr></thead>
              <tbody>{students.map(st=>{
                const sid=st.studentId||st.id;
                const total=cnt.reduce((s,c)=>s+(getScore(sid,c.id)??0),0);
                const mx=cnt.reduce((s,c)=>s+(c.totalPoints||0),0);
                return(<tr key={st.id}>
                  <td style={{padding:"8px",borderBottom:`1px solid ${C.border}`}}><div className="bo2">{st.name}</div><div className="xs mu">{st.points||0} نقطة</div></td>
                  {cnt.map(c=>{const score=getScore(sid,c.id);const ck=`${sid}_${c.id}`;
                    return(<td key={c.id} style={{padding:"8px",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>
                      {ed===ck?(<div className="fl ac g4" style={{justifyContent:"center"}}>
                        <input type="number" value={ev} onChange={e=>setEv(e.target.value)} style={{width:"48px",padding:"4px",background:C.hi,border:`1px solid ${C.accent}`,borderRadius:"6px",color:C.text,fontFamily:"Cairo",textAlign:"center"}}/>
                        <button className="btn bg bsm" style={{padding:"3px 7px"}} onClick={()=>save(sid,c.id)}>✓</button>
                      </div>):(
                        <div onClick={()=>{setEd(ck);setEv(score??"");}} style={{cursor:"pointer",padding:"4px 8px",borderRadius:"7px",background:score!==null?"rgba(16,185,129,.1)":C.hi,color:score!==null?C.green:C.mut,fontWeight:700,display:"inline-block",minWidth:"34px"}}>{score!==null?score:"—"}</div>
                      )}
                    </td>);})}
                  <td style={{padding:"8px",textAlign:"center",borderBottom:`1px solid ${C.border}`,fontWeight:900,color:C.gold}}>{total}/{mx}</td>
                </tr>);})}
              </tbody>
            </table>
            <div className="xs mu tc mt8">اضغط على أي خانة لتعديل الدرجة يدوياً</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  نموذج المحتوى
// ══════════════════════════════════════════════════════
function ContentForm({classId,editItem,onClose,show}){
  const [type,setType]=useState(editItem?.type||"post");
  const [f,setF]=useState({title:editItem?.title||"",body:editItem?.body||"",url:editItem?.url||"",points:editItem?.totalPoints||editItem?.points||10,targetLevel:editItem?.targetLevel||"all"});
  const [questions,setQ]=useState(editItem?.questions||[{text:"",options:["","","",""],correct:0,points:5}]);
  const [loading,setL]=useState(false);
  const set=k=>e=>setF(x=>({...x,[k]:e.target.value}));
  const addQ=()=>setQ(q=>[...q,{text:"",options:["","","",""],correct:0,points:5}]);
  const upQ=(i,k,v)=>setQ(q=>q.map((x,j)=>j===i?{...x,[k]:v}:x));
  const upO=(qi,oi,v)=>setQ(q=>q.map((x,j)=>j===qi?{...x,options:x.options.map((o,k)=>k===oi?v:o)}:x));
  const submit=async()=>{
    if(!f.title.trim()){show("أدخل عنواناً","error");return;}
    setL(true);
    try{
      const tp=type==="homework"?questions.reduce((s,q)=>s+Number(q.points),0):Number(f.points);
      const data={type,title:f.title,body:f.body,targetLevel:f.targetLevel,totalPoints:tp,classId,
        ...(type==="video"&&{url:f.url,videoId:getYtId(f.url)}),
        ...(type==="homework"&&{questions}),
        ...(type==="task"&&{points:Number(f.points)}),
      };
      if(editItem){
        await db.collection("classrooms").doc(classId).collection("content").doc(editItem.id).update(data);
        show("تم تعديل المحتوى ✅");
      } else {
        await db.collection("classrooms").doc(classId).collection("content").add({...data,createdAt:FS.serverTimestamp()});
        show("تم نشر المحتوى ✅");
      }
      onClose();
    }catch(e){show(e.message,"error");}
    setL(false);
  };
  const TL={post:"📢 منشور",video:"🎬 فيديو",homework:"📝 واجب",task:"📋 مهمة"};
  return(
    <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="fl ac jb mb16">
          <div className="sec" style={{marginBottom:0}}>{editItem?"✏️ تعديل":"➕ إضافة"} محتوى</div>
          <button className="btn bs bsm" onClick={onClose}>✕</button>
        </div>
        {!editItem&&<div className="fl wrap g8 mb16">{Object.entries(TL).map(([k,v])=><button key={k} className={`btn bsm ${type===k?"bp":"bs"}`} onClick={()=>setType(k)}>{v}</button>)}</div>}
        <div className="fl fc g12">
          <input className="inp" placeholder="العنوان *" value={f.title} onChange={set("title")}/>
          {type==="post"&&<textarea className="inp" placeholder="نص المنشور..." rows={4} value={f.body} onChange={set("body")}/>}
          {type==="video"&&<>
            <input className="inp" placeholder="رابط يوتيوب..." value={f.url} onChange={set("url")} dir="ltr"/>
            <div className="fl ac g8"><span className="sm mu">نقاط المشاهدة:</span><input className="inp" type="number" value={f.points} onChange={set("points")} style={{width:"72px"}}/></div>
            {f.url&&getYtId(f.url)&&<img src={`https://img.youtube.com/vi/${getYtId(f.url)}/hqdefault.jpg`} style={{width:"100%",borderRadius:"10px"}} alt="معاينة"/>}
          </>}
          {type==="task"&&<>
            <textarea className="inp" placeholder="وصف المهمة الأدائية..." rows={3} value={f.body} onChange={set("body")}/>
            <div className="fl ac g8"><span className="sm mu">الدرجة الكاملة:</span><input className="inp" type="number" value={f.points} onChange={set("points")} style={{width:"72px"}}/></div>
          </>}
          {type==="homework"&&<div>
            {questions.map((q,qi)=>(
              <div key={qi} className="card mb12" style={{padding:"12px",background:C.hi}}>
                <div className="fl ac jb mb8">
                  <span className="sm bo2 ac2">سؤال {qi+1}</span>
                  <div className="fl ac g8">
                    <span className="xs mu">الدرجة:</span>
                    <input className="inp" type="number" value={q.points} onChange={e=>upQ(qi,"points",Number(e.target.value))} style={{width:"52px",padding:"5px"}}/>
                    {questions.length>1&&<button className="btn br bsm" style={{padding:"3px 7px"}} onClick={()=>setQ(qs=>qs.filter((_,i)=>i!==qi))}>🗑</button>}
                  </div>
                </div>
                <input className="inp mb8" placeholder="نص السؤال..." value={q.text} onChange={e=>upQ(qi,"text",e.target.value)}/>
                {q.options.map((opt,oi)=>(
                  <div key={oi} className="fl ac g8 mb4">
                    <input type="radio" name={`c_${qi}`} checked={q.correct===oi} onChange={()=>upQ(qi,"correct",oi)} style={{accentColor:C.green}}/>
                    <input className="inp" placeholder={`الخيار ${oi+1}`} value={opt} onChange={e=>upO(qi,oi,e.target.value)}/>
                  </div>
                ))}
              </div>
            ))}
            <button className="btn bs bsm wf" onClick={addQ}>+ إضافة سؤال</button>
            <div className="xs mu tc mt8">المجموع: {questions.reduce((s,q)=>s+Number(q.points),0)} درجة</div>
          </div>}
          <div>
            <div className="sm mu mb8">الفئة المستهدفة:</div>
            <div className="fl wrap g8">
              {[["all","🌐 الجميع"],["advanced","⭐ متقدم"],["medium","📘 متوسط"],["low","💪 مجتهد"]].map(([v,l])=>(
                <button key={v} className={`btn bsm ${f.targetLevel===v?"bp":"bs"}`} onClick={()=>setF(x=>({...x,targetLevel:v}))}>{l}</button>
              ))}
            </div>
          </div>
          <button className="btn bp bfull" onClick={submit} disabled={loading}>{loading?<Sp s={18}/>:"🚀 "+(editItem?"حفظ التعديل":"نشر المحتوى")}</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  بطاقة المحتوى — الطالب
// ══════════════════════════════════════════════════════
function ContentCard({item,done,onDone,studentId,classId}){
  const [open,setOpen]=useState(false);
  const [exp,setExp]=useState(false);
  const [ans,setAns]=useState({});
  const [sub,setSub]=useState(done);
  const [res,setRes]=useState(null);
  const [imgFile,setImgFile]=useState(null);
  const [imgPrev,setImgPrev]=useState(null);
  const [note,setNote]=useState("");
  const [uploading,setUpl]=useState(false);
  const [taskStatus,setTaskStatus]=useState(null);
  const [watchTimer,setWatchTimer]=useState(0); // ثواني المشاهدة
  const [canClaim,setCanClaim]=useState(false);
  const timerRef=useRef(null);
  const fileRef=useRef();

  useEffect(()=>{
    if(item.type==="task"&&done){
      db.collection("classrooms").doc(classId).collection("submissions")
        .where("studentId","==",studentId).where("contentId","==",item.id).get()
        .then(s=>{if(!s.empty)setTaskStatus(s.docs[0].data().status||"pending");});
    }
  },[done]);

  // مؤقت مشاهدة الفيديو
  const startTimer=()=>{
    if(timerRef.current) return;
    timerRef.current=setInterval(()=>{
      setWatchTimer(t=>{
        const newT=t+1;
        if(newT>=60) setCanClaim(true);
        return newT;
      });
    },1000);
  };
  const stopTimer=()=>{ if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null;} };
  useEffect(()=>()=>stopTimer(),[]);

  const TI={post:"📢",video:"🎬",homework:"📝",task:"📋"};
  const TB={post:"bpost",video:"bvid",homework:"bhw",task:"btask"};
  const TL={post:"منشور",video:"فيديو",homework:"واجب",task:"مهمة"};

  const submitHW=()=>{
    let score=0;
    item.questions.forEach((q,i)=>{if(ans[i]===q.correct)score+=Number(q.points);});
    const total=item.questions.reduce((s,q)=>s+Number(q.points),0);
    setRes({score,total});setSub(true);
    onDone(score,item.id,{score,contentId:item.id,type:"homework"});
  };

  const onImgChange=e=>{
    const file=e.target.files[0];if(!file)return;
    setImgFile(file);
    const reader=new FileReader();
    reader.onload=ev=>setImgPrev(ev.target.result);
    reader.readAsDataURL(file);
  };

  const submitTask=async()=>{
    if(!imgFile){alert("يرجى اختيار صورة للمهمة");return;}
    setUpl(true);
    // تحويل الصورة لـ base64 مباشرة — بدون Firebase Storage لتجنب التعليق
    const toBase64=(file)=>new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result);
      r.onerror=()=>rej(new Error("فشل قراءة الصورة"));
      r.readAsDataURL(file);
    });
    try{
      const base64=await toBase64(imgFile);
      await db.collection("classrooms").doc(classId).collection("submissions").add({
        studentId,contentId:item.id,type:"task",imageUrl:base64,note,status:"pending",createdAt:FS.serverTimestamp()
      });
      setSub(true);setTaskStatus("pending");
      onDone(0,item.id,{type:"task",status:"pending"});
    }catch(e){alert("حدث خطأ: "+e.message);}
    setUpl(false);
  };

  // المنشور
  if(item.type==="post"){
    return(
      <div className={`ccard ${!open?"":"" }`} style={{cursor:!open?"pointer":"default"}} onClick={!open?()=>setOpen(true):undefined}>
        <div className="fl ac jb mb8">
          <span className="badge bpost">📢 منشور</span>
          {!open&&<span className="xs mu">👆 اضغط للقراءة</span>}
          {open&&sub&&<span className="badge bappr">✅ مقروء</span>}
        </div>
        <div className="bo2">{item.title}</div>
        {!open&&<div className="sm mt4" style={{filter:"blur(4px)",userSelect:"none",color:C.mut}}>■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■</div>}
        {open&&<>
          {item.body&&<div className="sm mt8" style={{lineHeight:1.9,color:C.text}}>{item.body}</div>}
          {!sub&&<button className="btn bs bsm mt12" onClick={()=>{setSub(true);onDone(0,item.id);}}>✅ تم القراءة</button>}
        </>}
      </div>
    );
  }

  return(
    <div className="ccard">
      <div className="fl ac jb mb8">
        <div className="fl wrap g8">
          <span className={`badge ${TB[item.type]}`}>{TI[item.type]} {TL[item.type]}</span>
          {sub&&item.type!=="task"&&<span className="badge bappr">✅ منجز</span>}
          {item.type==="task"&&taskStatus&&(
            <span className={`badge ${taskStatus==="approved"?"bappr":taskStatus==="rejected"?"brej":"bpend"}`}>
              {taskStatus==="approved"?"✅ مقبولة":taskStatus==="rejected"?"✕ مرفوضة":"⏳ قيد المراجعة"}
            </span>
          )}
        </div>
        <span className="pill">{item.totalPoints||item.points||0} درجة</span>
      </div>
      <div className="bo2">{item.title}</div>
      {item.body&&<div className="sm mu mt4">{item.body}</div>}

      {/* فيديو */}
      {item.type==="video"&&(
        <div className="mt8">
          {!exp?<button className="btn br bsm" onClick={()=>{setExp(true);}}>▶ شاهد الفيديو</button>
          :<>
            <iframe className="yt"
              src={`https://www.youtube.com/embed/${item.videoId}?autoplay=1&enablejsapi=1`}
              allowFullScreen title={item.title}
              onLoad={startTimer}
            />
            <div className="fl ac jb mt8">
              <div className="xs mu">
                {canClaim?"✅ يمكنك الآن المطالبة بالنقاط":`⏱ شاهد ${Math.max(0,60-watchTimer)} ثانية أخرى`}
              </div>
              <div className="xs" style={{color:watchTimer>=60?C.green:C.mut}}>{watchTimer}ث / 60ث</div>
            </div>
            {!sub&&canClaim&&(
              <button className="btn bg bfull mt8" onClick={()=>{stopTimer();setSub(true);onDone(item.totalPoints||item.points||10,item.id);}}>
                ✅ انتهيت من المشاهدة (+{item.totalPoints||item.points||10} نقطة)
              </button>
            )}
            {!sub&&!canClaim&&exp&&(
              <button className="btn bs bfull mt8" disabled>⏳ استمر في المشاهدة ({60-watchTimer} ثانية متبقية)</button>
            )}
          </>}
        </div>
      )}

      {/* واجب */}
      {item.type==="homework"&&(
        <div className="mt8">
          {!exp&&!sub&&<button className="btn bp bsm" onClick={()=>setExp(true)}>📝 ابدأ الواجب</button>}
          {exp&&!sub&&<div>
            {item.questions?.map((q,qi)=>(
              <div key={qi} className="card mb12" style={{padding:"12px",background:C.hi}}>
                <div className="bo2 sm mb8">{qi+1}. {q.text}</div>
                {q.options.map((opt,oi)=>(
                  <button key={oi} className={`optb ${ans[qi]===oi?"sel":""}`} onClick={()=>setAns(a=>({...a,[qi]:oi}))}>
                    {["أ","ب","ج","د"][oi]}. {opt}
                  </button>
                ))}
              </div>
            ))}
            <button className="btn bp bfull" onClick={submitHW} disabled={Object.keys(ans).length<(item.questions?.length||0)}>✅ تسليم الواجب</button>
          </div>}
          {sub&&res&&<div className="card mt8 tc" style={{background:res.score>=res.total*.5?"rgba(16,185,129,.1)":"rgba(239,68,68,.08)"}}>
            <div style={{fontSize:"1.8rem"}}>{res.score>=res.total*.5?"🎉":"💪"}</div>
            <div className="bk lg mt8">{res.score} / {res.total}</div>
            <div className="sm mu mt4">{res.score>=res.total*.8?"ممتاز!":res.score>=res.total*.5?"جيد، استمر!":"راجع الدرس"}</div>
          </div>}
        </div>
      )}

      {/* مهمة أدائية */}
      {item.type==="task"&&!sub&&(
        <div className="mt12">
          <div className="upl" onClick={()=>fileRef.current?.click()}>
            {imgPrev
              ?<img src={imgPrev} style={{maxWidth:"100%",maxHeight:"200px",borderRadius:"8px",objectFit:"contain"}} alt="المهمة"/>
              :<div><div style={{fontSize:"2.2rem"}}>📷</div><div className="sm mu mt8">اضغط لاختيار صورة المهمة</div><div className="xs mu mt4">JPG أو PNG</div></div>
            }
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={onImgChange}/>
          </div>
          {imgPrev&&<button className="btn bs bsm mt8" onClick={()=>{setImgFile(null);setImgPrev(null);}}>🔄 تغيير الصورة</button>}
          <textarea className="inp mt8" placeholder="ملاحظة للمعلم (اختياري)..." rows={2} value={note} onChange={e=>setNote(e.target.value)}/>
          <button className="btn bo bfull mt8" onClick={submitTask} disabled={uploading||!imgFile}>
            {uploading?<><Sp s={16}/> جاري الرفع...</>:"📤 رفع المهمة للمعلم"}
          </button>
        </div>
      )}
      {item.type==="task"&&sub&&<div className="card mt8" style={{padding:"11px",background:taskStatus==="approved"?"rgba(16,185,129,.08)":taskStatus==="rejected"?"rgba(239,68,68,.08)":"rgba(245,158,11,.08)",borderColor:taskStatus==="approved"?C.green:taskStatus==="rejected"?C.red:C.gold}}>
        <div className={`sm bo2 ${taskStatus==="approved"?"gr":taskStatus==="rejected"?"re":"gl"}`}>
          {taskStatus==="approved"?"✅ تم قبول مهمتك ومنحك النقاط!":taskStatus==="rejected"?"✕ تم رفض المهمة — راجع معلمك":"⏳ تم إرسال المهمة — في انتظار مراجعة المعلم"}
        </div>
      </div>}
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  شاشة تسجيل الدخول
// ══════════════════════════════════════════════════════
function AuthScreen({onUser}){
  const [mode,setMode]=useState("login");
  const [f,setF]=useState({name:"",email:"",password:"",code:"",pin:"",newPass:"",confirmPass:""});
  const [loading,setL]=useState(false);
  const [err,setErr]=useState("");
  const [msg,setMsg]=useState("");
  const [needNewPass,setNeedNewPass]=useState(false);
  const [tempUser,setTempUser]=useState(null);
  const set=k=>e=>setF(x=>({...x,[k]:e.target.value}));
  const ERRS={"auth/email-already-in-use":"البريد مستخدم مسبقاً","auth/user-not-found":"البريد غير مسجل","auth/wrong-password":"كلمة المرور خاطئة","auth/weak-password":"كلمة المرور قصيرة جداً","auth/invalid-email":"البريد غير صحيح","auth/invalid-credential":"البريد أو كلمة المرور غير صحيحة"};

  const teacherAuth=async()=>{
    setErr("");setL(true);
    try{
      if(mode==="register"){
        const c=await auth.createUserWithEmailAndPassword(f.email,f.password);
        await c.user.updateProfile({displayName:f.name});
        await db.collection("users").doc(c.user.uid).set({name:f.name,email:f.email,role:"teacher",createdAt:FS.serverTimestamp()});
        onUser({uid:c.user.uid,displayName:f.name,role:"teacher"});
      } else {
        const c=await auth.signInWithEmailAndPassword(f.email,f.password);
        const snap=await db.collection("users").doc(c.user.uid).get();
        onUser({uid:c.user.uid,displayName:c.user.displayName,role:(snap.data()||{}).role||"teacher"});
      }
    }catch(e){setErr(ERRS[e.code]||e.message);}
    setL(false);
  };

  const resetPassword=async()=>{
    if(!f.email){setErr("أدخل البريد الإلكتروني أولاً");return;}
    setL(true);
    try{
      await auth.sendPasswordResetEmail(f.email);
      setMsg("✅ تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك");setErr("");
    }catch(e){setErr(ERRS[e.code]||e.message);}
    setL(false);
  };

  const studentJoin=async()=>{
    setErr("");setL(true);
    try{
      if(!f.name.trim()||!f.code.trim()){setErr("أدخل اسمك ورمز الفصل");setL(false);return;}
      if(!f.newPass||f.newPass.length<4){setErr("كلمة المرور يجب أن تكون 4 أحرف على الأقل");setL(false);return;}
      const snap=await db.collection("classrooms").where("code","==",f.code.toUpperCase()).get();
      if(snap.empty){setErr("رمز الفصل غير صحيح");setL(false);return;}
      const cls=snap.docs[0];
      const pin=genPin();
      const email=`s_${Date.now()}@kawn.app`;
      const pwd=f.newPass;
      const c=await auth.createUserWithEmailAndPassword(email,pwd);
      await c.user.updateProfile({displayName:f.name});
      const sd={name:f.name,role:"student",email,password:pwd,pin,classId:cls.id,className:cls.data().name,teacherId:cls.data().teacherId,teacherName:cls.data().teacherName,level:"medium",points:0,joinedAt:FS.serverTimestamp()};
      await db.collection("users").doc(c.user.uid).set(sd);
      await db.collection("classrooms").doc(cls.id).collection("students").doc(c.user.uid).set({studentId:c.user.uid,name:f.name,level:"medium",points:0,joinedAt:FS.serverTimestamp()});
      onUser({uid:c.user.uid,displayName:f.name,role:"student",...sd,_showPin:true,_pin:pin});
    }catch(e){setErr(e.message);}
    setL(false);
  };

  const pinLogin=async()=>{
    setErr("");setL(true);
    try{
      if(!f.pin.trim()){setErr("أدخل رمز PIN");setL(false);return;}
      if(!f.password.trim()){setErr("أدخل كلمة المرور");setL(false);return;}
      const snap=await db.collection("users").where("pin","==",f.pin.trim()).where("role","==","student").get();
      if(snap.empty){setErr("رمز PIN غير صحيح");setL(false);return;}
      const data=snap.docs[0].data();
      const uid=snap.docs[0].id;
      if(data.mustChangePass){
        setTempUser({uid,data});
        setNeedNewPass(true);
        setL(false);return;
      }
      await auth.signInWithEmailAndPassword(data.email,f.password);
      onUser({uid,displayName:data.name,role:"student",...data});
    }catch(e){setErr("كلمة المرور غير صحيحة");}
    setL(false);
  };

  const changePass=async()=>{
    if(!f.newPass||f.newPass.length<4){setErr("كلمة المرور يجب أن تكون 4 أحرف على الأقل");return;}
    setL(true);
    try{
      const {uid,data}=tempUser;
      const c=await auth.signInWithEmailAndPassword(data.email,data.password);
      await c.user.updatePassword(f.newPass);
      await db.collection("users").doc(uid).update({password:f.newPass,mustChangePass:false});
      onUser({uid,displayName:data.name,role:"student",...data,password:f.newPass,mustChangePass:false});
    }catch(e){setErr(e.message);}
    setL(false);
  };

  if(needNewPass) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",zIndex:1,position:"relative"}}>
      <div style={{width:"100%",maxWidth:"380px"}}>
        <div className="card glow">
          <div className="sec">🔐 تغيير كلمة المرور</div>
          <div className="sm mu mb16">أنت مطالب بتغيير كلمة المرور قبل الدخول</div>
          <div className="fl fc g12">
            <input className="inp" type="password" placeholder="كلمة المرور الجديدة (4 أحرف على الأقل)" value={f.newPass} onChange={set("newPass")}/>
            {err&&<div className="re sm tc">{err}</div>}
            <button className="btn bp bfull" onClick={changePass} disabled={loading}>{loading?<Sp s={18}/>:"✅ تغيير وتسجيل الدخول"}</button>
          </div>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",zIndex:1,position:"relative"}}>
      <div style={{width:"100%",maxWidth:"400px"}}>
        <div className="tc mb16">
          <div className="koni" style={{fontSize:"3.8rem"}}>🤖</div>
          <div className="logo">KAWN</div>
          <div className="logo-sub">منصة كون التعليمية</div>
        </div>
        <div className="tabs mb16">
          <button className={`tab ${mode!=="join"&&mode!=="pin"?"active":""}`} onClick={()=>{setMode("login");setErr("");setMsg("");}}>👨‍🏫 معلم</button>
          <button className={`tab ${mode==="join"?"active":""}`} onClick={()=>{setMode("join");setErr("");setMsg("");}}>🎓 طالب جديد</button>
          <button className={`tab ${mode==="pin"?"active":""}`} onClick={()=>{setMode("pin");setErr("");setMsg("");}}>🔢 دخول PIN</button>
        </div>
        <div className="card glow">
          {mode==="join"&&<div className="fl fc g12">
            <div className="sec">🚀 انضم لفصلك</div>
            <input className="inp" placeholder="اسمك الكامل" value={f.name} onChange={set("name")}/>
            <input className="inp" placeholder="رمز الفصل (من معلمك)" value={f.code} onChange={set("code")} style={{letterSpacing:"5px",textAlign:"center",fontSize:"1.2rem",fontWeight:900}}/>
            <input className="inp" type="password" placeholder="اختر كلمة مرور خاصة بك (4+ أحرف)" value={f.newPass} onChange={set("newPass")}/>
            {err&&<div className="re sm tc">{err}</div>}
            <button className="btn bc bfull" onClick={studentJoin} disabled={loading}>{loading?<Sp s={18}/>:"🎮 انضم الآن"}</button>
            <div className="xs mu tc">ستحصل على رمز PIN — احتفظ به للدخول لاحقاً</div>
          </div>}

          {mode==="pin"&&<div className="fl fc g12">
            <div className="sec">🔢 دخول بـ PIN</div>
            <input className="inp" placeholder="رمز PIN (6 أرقام)" value={f.pin} onChange={set("pin")} style={{letterSpacing:"6px",textAlign:"center",fontSize:"1.3rem",fontWeight:900}} maxLength={6} type="number"/>
            <input className="inp" type="password" placeholder="كلمة المرور" value={f.password} onChange={set("password")}/>
            {err&&<div className="re sm tc">{err}</div>}
            <button className="btn bgold bfull" onClick={pinLogin} disabled={loading}>{loading?<Sp s={18}/>:"🚪 دخول"}</button>
          </div>}

          {(mode==="login"||mode==="register")&&<div>
            <div className="tabs mb16" style={{marginTop:0}}>
              <button className={`tab ${mode==="login"?"active":""}`} onClick={()=>setMode("login")}>دخول</button>
              <button className={`tab ${mode==="register"?"active":""}`} onClick={()=>setMode("register")}>تسجيل جديد</button>
            </div>
            <div className="fl fc g12">
              {mode==="register"&&<input className="inp" placeholder="اسمك الكامل" value={f.name} onChange={set("name")}/>}
              <input className="inp" placeholder="البريد الإلكتروني" type="email" value={f.email} onChange={set("email")} dir="ltr"/>
              {mode==="login"&&<div className="fl fc g4">
                <input className="inp" placeholder="كلمة المرور" type="password" value={f.password} onChange={set("password")} dir="ltr"/>
                <button className="btn bs bsm" style={{alignSelf:"flex-start",fontSize:".75rem",padding:"5px 10px"}} onClick={resetPassword} disabled={loading}>نسيت كلمة المرور؟</button>
              </div>}
              {mode==="register"&&<input className="inp" placeholder="كلمة المرور" type="password" value={f.password} onChange={set("password")} dir="ltr"/>}
              {err&&<div className="re sm tc">{err}</div>}
              {msg&&<div className="gr sm tc">{msg}</div>}
              <button className="btn bp bfull" onClick={teacherAuth} disabled={loading}>{loading?<Sp s={18}/>:mode==="login"?"🔑 دخول":"✨ إنشاء حساب"}</button>
            </div>
          </div>}
        </div>
        <div className="xs mu tc mt12">منصة كون © 2025 — أ. عمار العوض</div>
      </div>
    </div>
  );
}

function GameQuizTab({classId,show}){
  const [questions,setQuestions]=useState([]);
  const [loading,setL]=useState(true);
  const [showForm,setSF]=useState(false);
  const [form,setForm]=useState({q:"",o:["","","",""],a:0,pts:15});

  useEffect(()=>{loadQuestions();},[]);

  const loadQuestions=async()=>{
    setL(true);
    try{
      const snap=await db.collection("classrooms").doc(classId).collection("gameQuestions").get();
      setQuestions(snap.docs.map(d=>({id:d.id,...d.data()})));
    }catch(e){}
    setL(false);
  };

  const addQuestion=async()=>{
    if(!form.q.trim()){show("أدخل نص السؤال","error");return;}
    if(form.o.some(o=>!o.trim())){show("أكمل جميع الخيارات","error");return;}
    try{
      await db.collection("classrooms").doc(classId).collection("gameQuestions").add({
        q:form.q,o:form.o,a:form.a,pts:Number(form.pts),
        createdAt:FS.serverTimestamp()
      });
      show("تم إضافة السؤال ✅");
      setForm({q:"",o:["","","",""],a:0,pts:15});
      setSF(false);
      loadQuestions();
    }catch(e){show(e.message,"error");}
  };

  const deleteQuestion=async(id)=>{
    if(!confirm("حذف هذا السؤال؟")) return;
    await db.collection("classrooms").doc(classId).collection("gameQuestions").doc(id).delete();
    setQuestions(q=>q.filter(x=>x.id!==id));
    show("تم الحذف");
  };

  const setOpt=(i,v)=>setForm(f=>({...f,o:f.o.map((x,j)=>j===i?v:x)}));

  return(
    <div>
      {/* رأس القسم */}
      <div className="card mb16" style={{background:"rgba(124,58,237,.08)",borderColor:"rgba(124,58,237,.3)",padding:"14px"}}>
        <div className="fl ac jb">
          <div>
            <div className="bo2" style={{color:"#a855f7"}}>🎮 أسئلة لعبة كوني</div>
            <div className="xs mu mt4">تظهر للطلاب بين موجات القتال كتحدي علمي — الإجابة الصحيحة تمنحهم قنبلة وحياة إضافية!</div>
          </div>
          <button className="btn bp bsm" onClick={()=>setSF(!showForm)}>{showForm?"✕ إغلاق":"+ إضافة سؤال"}</button>
        </div>
      </div>

      {/* نموذج الإضافة */}
      {showForm&&(
        <div className="card mb16 card-glow">
          <div className="sec" style={{marginBottom:"12px"}}>➕ سؤال جديد</div>
          <div className="flex fc g12">
            <div>
              <div className="sm mu mb4">نص السؤال *</div>
              <textarea className="inp" rows={2} placeholder="اكتب السؤال هنا..." value={form.q} onChange={e=>setForm(f=>({...f,q:e.target.value}))}/>
            </div>
            <div>
              <div className="sm mu mb8">الخيارات (اختر الصحيحة بالنقر على الدائرة)</div>
              {form.o.map((opt,i)=>(
                <div key={i} className="fl ac g8 mb8">
                  <input type="radio" name="correct" checked={form.a===i} onChange={()=>setForm(f=>({...f,a:i}))} style={{accentColor:"#10b981",width:"18px",height:"18px",flexShrink:0}}/>
                  <input className="inp" placeholder={`الخيار ${["أ","ب","ج","د"][i]}`} value={opt} onChange={e=>setOpt(i,e.target.value)} style={{flex:1}}/>
                  {form.a===i&&<span className="badge bmed">✓ صحيح</span>}
                </div>
              ))}
            </div>
            <div className="fl ac g8">
              <span className="sm mu">النقاط:</span>
              <select className="inp" value={form.pts} onChange={e=>setForm(f=>({...f,pts:e.target.value}))} style={{width:"90px"}}>
                {[10,15,20,25,30].map(v=><option key={v} value={v}>{v} ⭐</option>)}
              </select>
            </div>
            <button className="btn bp bfull" onClick={addQuestion}>🚀 إضافة السؤال</button>
          </div>
        </div>
      )}

      {/* قائمة الأسئلة */}
      <div className="sec">📋 الأسئلة المضافة ({questions.length})</div>
      {loading?<div className="fl jc" style={{padding:"24px"}}><Sp/></div>
      :questions.length===0?(
        <div className="card tc" style={{padding:"32px"}}>
          <div style={{fontSize:"2.5rem"}}>🎮</div>
          <div className="bo2 mt12">لا توجد أسئلة بعد</div>
          <div className="sm mu mt8">أضف أسئلة علمية ليواجهها الطلاب أثناء اللعب!</div>
        </div>
      ):questions.map((q,i)=>(
        <div key={q.id} className="ccard">
          <div className="fl ac jb mb8">
            <div className="fl ac g8">
              <span className="badge bhw">سؤال {i+1}</span>
              <span className="pill">{q.pts} ⭐</span>
            </div>
            <button className="btn br bsm" style={{padding:"4px 9px"}} onClick={()=>deleteQuestion(q.id)}>🗑</button>
          </div>
          <div className="bo2 sm mb8">{q.q}</div>
          <div className="g2" style={{gap:"6px"}}>
            {q.o?.map((opt,oi)=>(
              <div key={oi} className="xs" style={{padding:"6px 10px",borderRadius:"8px",background:oi===q.a?"rgba(16,185,129,.15)":"rgba(30,13,61,.6)",border:`1px solid ${oi===q.a?"#10b981":"#2d1660"}`,color:oi===q.a?"#10b981":"#9d8ab5"}}>
                {["أ","ب","ج","د"][oi]}. {opt} {oi===q.a?"✓":""}
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* تعليمات */}
      {questions.length>0&&(
        <div className="card mt16" style={{background:"rgba(6,182,212,.06)",borderColor:"rgba(6,182,212,.3)",padding:"12px"}}>
          <div className="sm bo2" style={{color:"#06b6d4"}}>💡 كيف تعمل الأسئلة؟</div>
          <div className="xs mu mt8" style={{lineHeight:"1.8"}}>
            • تظهر الأسئلة للطالب بين موجات القتال تلقائياً<br/>
            • الإجابة الصحيحة = +{questions[0]?.pts||15}⭐ + قنبلة إضافية<br/>
            • الإجابة الخاطئة = لا خسارة<br/>
            • مدة الإجابة: 15 ثانية
          </div>
        </div>
      )}
    </div>
  );
}

function ClassroomView({cls,user,onBack,show}){
  const [tab,setTab]=useState("content");
  const [students,setSt]=useState([]);
  const [content,setCont]=useState([]);
  const [loading,setL]=useState(true);
  const [showForm,setSF]=useState(false);
  const [editItem,setEdit]=useState(null);
  const [showGrades,setSG]=useState(false);
  const [reviewItem,setReview]=useState(null);
  const [selectedSt,setSelectedSt]=useState(null);
  const [activityFilter,setActFilter]=useState(null); // لفلترة من أنجز ماذا

  useEffect(()=>{
    (async()=>{
      const [sS,cS]=await Promise.all([
        db.collection("classrooms").doc(cls.id).collection("students").get(),
        db.collection("classrooms").doc(cls.id).collection("content").orderBy("createdAt","desc").get(),
      ]);
      setSt(sS.docs.map(d=>({id:d.id,...d.data()})));
      setCont(cS.docs.map(d=>({id:d.id,...d.data()})));
      setL(false);
    })();
  },[]);

  const delCont=async id=>{
    if(!confirm("حذف هذا المحتوى؟")) return;
    await db.collection("classrooms").doc(cls.id).collection("content").doc(id).delete();
    setCont(c=>c.filter(x=>x.id!==id));show("تم الحذف");
  };

  const delStudent=async sid=>{
    if(!confirm("حذف هذا الطالب؟ سيتم حذف بياناته نهائياً")) return;
    await db.collection("classrooms").doc(cls.id).collection("students").doc(sid).delete();
    setSt(s=>s.filter(x=>x.id!==sid));show("تم حذف الطالب");
  };

  const resetStudentPass=async(st)=>{
    const newPwd=genPass();
    await db.collection("users").doc(st.studentId||st.id).update({password:newPwd,mustChangePass:true});
    show(`كلمة المرور الجديدة: ${newPwd} — أعطها للطالب`);
    alert(`كلمة المرور الجديدة للطالب ${st.name}:\n${newPwd}\nسيُطلب منه تغييرها عند الدخول`);
  };

  const setLevel=async(sid,level)=>{
    await db.collection("classrooms").doc(cls.id).collection("students").doc(sid).update({level});
    setSt(s=>s.map(st=>st.id===sid?{...st,level}:st));show("تم تحديث المستوى ✅");
  };

  const reloadCont=async()=>{
    setSF(false);setEdit(null);
    const s=await db.collection("classrooms").doc(cls.id).collection("content").orderBy("createdAt","desc").get();
    setCont(s.docs.map(d=>({id:d.id,...d.data()})));
  };

  const TI={post:"📢",video:"🎬",homework:"📝",task:"📋"};
  const TB={post:"bpost",video:"bvid",homework:"bhw",task:"btask"};
  const TL2={post:"منشور",video:"فيديو",homework:"واجب",task:"مهمة أدائية"};
  const LL={all:"الجميع",advanced:"متقدم ⭐",medium:"متوسط 📘",low:"مجتهد 💪"};

  // مكوّن عرض نشاط المحتوى
  function ContentActivityRow({item}){
    const [subs,setSubs]=useState([]);
    const [loaded,setLoaded]=useState(false);
    const [open,setOpen]=useState(false);
    const load=async()=>{
      if(loaded) return;
      const s=await db.collection("classrooms").doc(cls.id).collection("submissions").where("contentId","==",item.id).get();
      setSubs(s.docs.map(d=>({id:d.id,...d.data()})));
      setLoaded(true);
    };
    return(
      <div className="ccard">
        <div className="fl ac jb mb8">
          <div className="fl wrap g8">
            <span className={`badge ${TB[item.type]}`}>{TI[item.type]} {TL2[item.type]}</span>
            <span className="badge" style={{background:"rgba(255,255,255,.05)",color:C.mut}}>🎯 {LL[item.targetLevel]||"الجميع"}</span>
          </div>
          <div className="fl g8 ac">
            {item.type==="task"&&<button className="btn bo bsm" onClick={()=>setReview(item)}>👁 مراجعة</button>}
            <button className="btn bs bsm" onClick={()=>{setEdit(item);setSF(true);}}>✏️</button>
            <span className="pill">{item.totalPoints||item.points||0} درجة</span>
            <button className="btn br bsm" style={{padding:"4px 8px"}} onClick={()=>delCont(item.id)}>🗑</button>
          </div>
        </div>
        <div className="bo2">{item.title}</div>
        {item.body&&<div className="sm mu mt4">{item.body.substring(0,80)}{item.body.length>80?"...":""}</div>}
        {item.type==="video"&&item.videoId&&<img src={`https://img.youtube.com/vi/${item.videoId}/hqdefault.jpg`} style={{width:"100%",borderRadius:"9px",marginTop:"9px"}} alt="thumb"/>}
        {item.type==="homework"&&<div className="xs mu mt8">{item.questions?.length||0} سؤال</div>}
        <button className="btn bs bsm mt8" onClick={()=>{setOpen(!open);load();}}>
          {open?"▲ إخفاء":"▼ "} من أنجز هذا؟
        </button>
        {open&&<div className="mt8">
          {!loaded?<Sp s={20}/>:subs.length===0?<div className="xs mu">لم يُنجز أحد بعد</div>
          :subs.map(s=>{
            const st=students.find(x=>x.studentId===s.studentId||x.id===s.studentId);
            return st?<div key={s.id} className="fl ac jb mt4" style={{padding:"5px 8px",background:C.hi,borderRadius:"7px"}}>
              <span className="xs bo2">{st.name}</span>
              <div className="fl ac g4">
                {s.pts>0&&<span className="pill" style={{fontSize:".68rem",padding:"2px 7px"}}>+{s.pts} نقطة</span>}
                {s.score!=null&&item.type==="homework"&&<span className="badge bmed" style={{fontSize:".68rem"}}>{s.score}/{item.totalPoints}</span>}
                {s.status&&<span className={`badge ${s.status==="approved"?"bappr":s.status==="rejected"?"brej":"bpend"}`} style={{fontSize:".68rem"}}>{s.status==="approved"?"✅":"⏳"}</span>}
              </div>
            </div>:null;
          })}
        </div>}
      </div>
    );
  }

  return(<>
    <nav className="nav">
      <button className="btn bs bsm" onClick={onBack}>← رجوع</button>
      <div className="tc"><div className="bk">{cls.name}</div><div className="xs mu">{cls.subject}</div></div>
      <div className="ctext" style={{fontSize:".95rem",letterSpacing:"4px"}}>{cls.code}</div>
    </nav>
    <div className="page">
      <div className="tabs mb16">
        {[["content","📚","المحتوى"],["students","👥","الطلاب"],["gamequiz","🎮","أسئلة اللعبة"],["qr","📱","QR"]].map(([k,ic,lb])=>(
          <button key={k} className={`tab ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{ic} {lb}</button>
        ))}
      </div>

      {tab==="content"&&<div>
        <div className="fl ac jb mb16">
          <div className="sec" style={{marginBottom:0}}>📚 محتوى الفصل</div>
          <div className="fl g8">
            <button className="btn bs bsm" onClick={()=>setSG(true)}>📊 الدرجات</button>
            <button className="btn bp bsm" onClick={()=>{setSF(true);setEdit(null);}}>+ إضافة</button>
          </div>
        </div>
        {loading?<div className="fl jc" style={{padding:"28px"}}><Sp/></div>
        :content.length===0?<div className="card tc" style={{padding:"32px"}}><div style={{fontSize:"2.2rem"}}>📭</div><div className="bo2 mt12">لا يوجد محتوى بعد</div><button className="btn bp mt16" onClick={()=>setSF(true)}>+ إضافة أول محتوى</button></div>
        :content.map(item=><ContentActivityRow key={item.id} item={item}/>)}
      </div>}

      {tab==="students"&&<div>
        <div className="fl ac jb mb16">
          <div className="sec" style={{marginBottom:0}}>👥 الطلاب ({students.length})</div>
        </div>
        {students.length===0?<div className="card tc" style={{padding:"28px"}}><div style={{fontSize:"2rem"}}>📭</div><div className="bo2 mt12">لم ينضم طلاب بعد</div><div className="sm mu mt8">رمز الفصل: <strong>{cls.code}</strong></div></div>
        :<div>
          <div className="fl wrap g8 mb16">
            {Object.entries(LEVELS).map(([k,v])=><span key={k} className={`badge ${v.cls}`}>{v.icon} {v.label}: {students.filter(s=>s.level===k).length}</span>)}
          </div>
          {students.map(st=>(
            <div key={st.id} className="srow" onClick={()=>setSelectedSt(st)}>
              <div className="av" style={{width:36,height:36,fontSize:".9rem"}}>{(st.name||"?")[0]}</div>
              <div style={{flex:1}}>
                <div className="bo2">{st.name}</div>
                <div className="xs mu">PIN: <strong style={{color:C.gold,letterSpacing:"2px"}}>{st.pin||"—"}</strong> · {st.points||0} نقطة 🏆</div>
              </div>
              <div className="fl wrap g4" onClick={e=>e.stopPropagation()}>
                {[["advanced","ladv","⭐"],["medium","lmed","📘"],["low","llow","💪"]].map(([k,c,ic])=>(
                  <button key={k} className={`lvb ${st.level===k?c:""}`} onClick={()=>setLevel(st.id,k)}>{ic}</button>
                ))}
                <button className="btn bs bsm" style={{padding:"4px 7px",fontSize:".7rem"}} onClick={()=>resetStudentPass(st)} title="إعادة تعيين كلمة المرور">🔑</button>
                <button className="btn br bsm" style={{padding:"4px 7px"}} onClick={()=>delStudent(st.id)}>🗑</button>
              </div>
            </div>
          ))}
        </div>}
      </div>}

      {tab==="gamequiz"&&<GameQuizTab classId={cls.id} show={show}/>}

      {tab==="qr"&&<div className="tc">
        <div className="card glow" style={{display:"inline-block",padding:"26px"}}>
          <div className="sec" style={{justifyContent:"center"}}>📱 امسح للانضمام</div>
          <QR value={`رمز الفصل: ${cls.code}`} size={190}/>
          <div className="ctext mt12">{cls.code}</div>
          <div className="sm mu mt8">اعرضه على شاشة الفصل</div>
        </div>
      </div>}
    </div>
    {showForm&&<ContentForm classId={cls.id} editItem={editItem} onClose={reloadCont} show={show}/>}
    {showGrades&&<GradesSheet classId={cls.id} students={students} onClose={()=>setSG(false)}/>}
    {reviewItem&&<TaskReview classId={cls.id} item={reviewItem} students={students} onClose={()=>setReview(null)} show={show}/>}
    {selectedSt&&<StudentReport student={selectedSt} classId={cls.id} contentList={content} onClose={()=>setSelectedSt(null)} teacherName={user.displayName||"المعلم"} onIssueCert={()=>{}}/>}
  </>);
}

function TeacherDashboard({user}){
  const [classes,setCls]=useState([]);
  const [loading,setL]=useState(true);
  const [view,setView]=useState("home");
  const [active,setActive]=useState(null);
  const {t,show}=useToast();
  useEffect(()=>{loadCls();},[]);
  const loadCls=async()=>{setL(true);const s=await db.collection("classrooms").where("teacherId","==",user.uid).get();setCls(s.docs.map(d=>({id:d.id,...d.data()})));setL(false);};
  const createCls=async(name,subject,grade)=>{
    const code=genCode();
    const data={name,subject,grade,code,teacherId:user.uid,teacherName:user.displayName||"المعلم",createdAt:FS.serverTimestamp(),studentCount:0};
    const ref=await db.collection("classrooms").add(data);
    const nc={id:ref.id,...data};setCls(c=>[...c,nc]);setActive(nc);setView("class");show("تم إنشاء الفصل 🎉");
  };
  const delClass=async(id,e)=>{
    e.stopPropagation();
    if(!confirm("حذف هذا الفصل نهائياً؟")) return;
    await db.collection("classrooms").doc(id).delete();
    setCls(c=>c.filter(x=>x.id!==id));show("تم حذف الفصل");
  };
  if(view==="create") return <CreateForm onBack={()=>setView("home")} onCreate={createCls}/>;
  if(view==="class"&&active) return <ClassroomView cls={active} user={user} onBack={()=>{setView("home");loadCls();}} show={show}/>;
  return(<>
    <nav className="nav">
      <div className="fl ac g12"><div className="logo" style={{fontSize:"1.3rem"}}>KAWN</div><span className="badge bteach">👨‍🏫 معلم</span></div>
      <div className="fl ac g8"><span className="sm mu">{user.displayName}</span><button className="btn bs bsm" onClick={()=>auth.signOut()}>خروج</button></div>
    </nav>
    <div className="page">
      <div className="fl ac jb mb16">
        <div><div style={{fontSize:"1.35rem",fontWeight:900}}>أهلاً، {user.displayName||"أستاذ"} 👋</div><div className="mu sm mt4">إدارة فصولك الدراسية</div></div>
        <button className="btn bp" onClick={()=>setView("create")}>+ فصل جديد</button>
      </div>
      <div className="g3 mb16">
        <div className="stat"><div className="snum ac2">{classes.length}</div><div className="slbl">فصل دراسي</div></div>
        <div className="stat"><div className="snum cy">{classes.reduce((s,c)=>s+(c.studentCount||0),0)}</div><div className="slbl">طالب</div></div>
        <div className="stat"><div className="snum">🤖</div><div className="slbl">كوني</div></div>
      </div>
      <div className="sec">🏫 فصولي الدراسية</div>
      {loading?<div className="fl jc" style={{padding:"32px"}}><Sp/></div>
      :classes.length===0?<div className="card tc" style={{padding:"32px"}}><div style={{fontSize:"2.2rem"}}>🏫</div><div className="bo2 mt12">لا توجد فصول بعد</div><button className="btn bp mt16" onClick={()=>setView("create")}>إنشاء فصل الآن</button></div>
      :classes.map(c=>(
        <div key={c.id} className="ccrd" onClick={()=>{setActive(c);setView("class");}}>
          <div className="fl ac jb">
            <div><div className="bk lg">{c.name}</div><div className="mu sm mt4">{c.subject} · {c.grade}</div></div>
            <div className="fl ac g8">
              <div><div className="ctext" style={{fontSize:"1.1rem",letterSpacing:"5px"}}>{c.code}</div><div className="xs mu tc">{c.studentCount||0} طالب</div></div>
              <button className="btn br bsm" style={{padding:"5px 9px"}} onClick={e=>delClass(c.id,e)}>🗑</button>
            </div>
          </div>
        </div>
      ))}
    </div>
    <Toast t={t}/>
  </>);
}

function StudentDashboard({user,userData}){
  const [tab,setTab]=useState("feed");
  const [content,setCont]=useState([]);
  const [loading,setL]=useState(true);
  const [points,setPts]=useState(userData?.points||0);
  const [done,setDone]=useState(new Set());
  const [lb,setLb]=useState([]);
  const [mySubs,setMySubs]=useState([]);
  const [showCert,setShowCert]=useState(false);
  const {t,show}=useToast();
  const classId=userData?.classId;
  const level=userData?.level||"medium";

  useEffect(()=>{
    if(!classId) return;
    (async()=>{
      const [cS,sS,lS]=await Promise.all([
        db.collection("classrooms").doc(classId).collection("content").orderBy("createdAt","desc").get(),
        db.collection("classrooms").doc(classId).collection("submissions").where("studentId","==",user.uid).get(),
        db.collection("classrooms").doc(classId).collection("students").get(),
      ]);
      const all=cS.docs.map(d=>({id:d.id,...d.data()}));
      setCont(all.filter(c=>c.targetLevel==="all"||c.targetLevel===level));
      const subDocs=sS.docs.map(d=>({id:d.id,...d.data()}));
      setDone(new Set(subDocs.map(d=>d.contentId)));
      setMySubs(subDocs);
      setLb(lS.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.points||0)-(a.points||0)));
      setL(false);
    })();
  },[classId]);

  const onDone=async(pts,contentId,extra={})=>{
    if(extra.type==="task") return;
    if(done.has(contentId)) return;
    setDone(s=>new Set([...s,contentId]));
    if(pts>0){setPts(p=>p+pts);show(`+${pts} نقطة 🎉`);}
    await db.collection("classrooms").doc(classId).collection("submissions").add({studentId:user.uid,contentId,pts,createdAt:FS.serverTimestamp(),...extra});
    if(pts>0){
      await db.collection("users").doc(user.uid).update({points:FS.increment(pts)});
      await db.collection("classrooms").doc(classId).collection("students").doc(user.uid).update({points:FS.increment(pts)});
    }
  };

  const kS=points<50?"🤖":points<150?"🦾":points<300?"🚀":"👾";
  const kN=points<50?"بذرة":points<150?"ناشئ":points<300?"بطل":"أسطورة";

  return(<>
    <nav className="nav">
      <div className="fl ac g8"><div className="logo" style={{fontSize:"1.3rem"}}>KAWN</div><span className="badge bstud">🎓</span></div>
      <div className="fl ac g8">
        <a href="kawn-game.html" style={{textDecoration:"none"}}>
          <button className="btn bgold bsm" style={{padding:"6px 12px",fontSize:".78rem",fontFamily:"Cairo"}}>🎮 العب كوني</button>
        </a>
        <span className="pill">{points} ⭐</span>
        <button className="btn bs bsm" onClick={()=>auth.signOut()}>خروج</button>
      </div>
    </nav>
    <div className="page">
      <div className="card glow mb16" style={{padding:"16px",background:"linear-gradient(135deg,rgba(245,158,11,.08),rgba(124,58,237,.08))",borderColor:"rgba(245,158,11,.3)"}}>
        <div className="fl ac jb">
          <div>
            <div className="bk" style={{fontSize:"1rem"}}>🎮 عالم كوني ينتظرك!</div>
            <div className="xs mu mt4">استخدم نقاطك لفتح كواكب جديدة وتطوير روبوتك</div>
          </div>
          <a href="kawn-game.html" style={{textDecoration:"none"}}>
            <button className="btn bgold" style={{fontFamily:"Cairo",padding:"10px 18px"}}>انطلق 🚀</button>
          </a>
        </div>
      </div>

      <div className="card glow tc mb16" style={{padding:"16px"}}>
        <div className="fl ac jb">
          <div style={{textAlign:"right"}}>
            <div className="bk">{user.displayName} <span className="ac2">— {kN}</span></div>
            <div className="xs mu mt4">{userData?.className}</div>
            <span className={`badge mt8 ${LEVELS[level]?.cls}`}>{LEVELS[level]?.icon} {LEVELS[level]?.label}</span>
          </div>
          <div className="koni" style={{fontSize:"3rem"}}>{kS}</div>
        </div>
        <div className="pbar mt12"><div className="pfill" style={{width:`${Math.min((points%100),100)}%`}}/></div>
        <div className="fl jb mt4"><span className="xs mu">{points%100}/100</span><span className="xs gl">{points} نقطة إجمالي</span></div>
      </div>

      <div className="tabs mb16">
        {[["feed","📚","المحتوى"],["mywork","📋","أعمالي"],["leaderboard","🏆","المتصدرون"]].map(([k,ic,lb2])=>(
          <button key={k} className={`tab ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{ic} {lb2}</button>
        ))}
      </div>

      {tab==="feed"&&(loading?<div className="fl jc" style={{padding:"32px"}}><Sp/></div>
        :content.length===0?<div className="card tc" style={{padding:"32px"}}><div style={{fontSize:"2.2rem"}}>📭</div><div className="bo2 mt12">لا يوجد محتوى بعد</div></div>
        :content.map(item=><ContentCard key={item.id} item={item} done={done.has(item.id)} onDone={onDone} studentId={user.uid} classId={classId}/>)
      )}

      {tab==="mywork"&&<div>
        <div className="sec">📋 أعمالي ونشاطاتي</div>
        {mySubs.length===0?<div className="card tc" style={{padding:"28px"}}><div style={{fontSize:"2rem"}}>📭</div><div className="mu sm mt8">لم تُنجز أي نشاط بعد</div></div>
        :mySubs.map(sub=>{
          const c=content.find(x=>x.id===sub.contentId);
          if(!c) return null;
          const TI2={post:"📢",video:"🎬",homework:"📝",task:"📋"};
          return(<div key={sub.id} className="ccard">
            <div className="fl ac jb">
              <div className="fl ac g8">
                <span className="badge bpost">{TI2[c.type]||"📄"} {c.title}</span>
              </div>
              <div className="fl ac g4">
                {sub.pts>0&&<span className="pill">+{sub.pts} ⭐</span>}
                {c.type==="homework"&&sub.score!=null&&<span className="badge bmed">{sub.score}/{c.totalPoints}</span>}
                {c.type==="task"&&<span className={`badge ${sub.status==="approved"?"bappr":sub.status==="rejected"?"brej":"bpend"}`}>
                  {sub.status==="approved"?"✅ مقبولة":sub.status==="rejected"?"✕ مرفوضة":"⏳ قيد المراجعة"}
                </span>}
              </div>
            </div>
            {c.type==="task"&&sub.imageUrl&&!sub.imageUrl.startsWith("data:")&&(
              <img src={sub.imageUrl} style={{width:"100%",maxHeight:"160px",objectFit:"contain",borderRadius:"8px",marginTop:"8px"}} alt="مهمتي"/>
            )}
          </div>);
        })}
        {points>=50&&<div className="card mt16" style={{background:"rgba(245,158,11,.08)",borderColor:C.gold,padding:"13px"}}>
          <div className="fl ac jb">
            <div><div className="bo2 gl">🏆 أنت مؤهل لشهادة تقدير!</div><div className="xs mu mt4">حققت {points} نقطة</div></div>
            <button className="btn bgold bsm" onClick={()=>setShowCert(true)}>عرض 🎖</button>
          </div>
        </div>}
      </div>}

      {tab==="leaderboard"&&<div>
        <div className="sec">🏆 لوحة المتصدرين</div>
        {lb.map((s,i)=>(
          <div key={s.id} className={`lbr ${s.studentId===user.uid||s.id===user.uid?"lbme":"lbo"}`}>
            <div style={{fontSize:i<3?"1.2rem":"1rem",minWidth:"24px",textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}</div>
            <div className="av" style={{width:28,height:28,fontSize:".76rem"}}>{(s.name||"?")[0]}</div>
            <div style={{flex:1}}><div className="bo2 sm">{s.name}{(s.studentId===user.uid||s.id===user.uid)?" (أنت)":""}</div></div>
            <div className="gl bo2">{s.points||0} ⭐</div>
          </div>
        ))}
      </div>}
    </div>
    <Toast t={t}/>
    {showCert&&<Certificate student={{name:user.displayName,points}} teacherName={userData?.teacherName||"المعلم"} onClose={()=>setShowCert(false)}/>}
  </>);
}

function App(){
  const [authUser,setAU]=useState(null);
  const [userData,setUD]=useState(null);
  const [loading,setL]=useState(true);
  const [showPin,setShowPin]=useState(false);
  const [newPin,setNewPin]=useState(null);

  useEffect(()=>{
    return auth.onAuthStateChanged(async u=>{
      if(u){
        try{
          const snap=await db.collection("users").doc(u.uid).get();
          const data=snap.data()||{};
          setUD(data);
          setAU({uid:u.uid,displayName:u.displayName||data.name,role:data.role||"teacher"});
        }catch{setAU({uid:u.uid,displayName:u.displayName,role:"teacher"});}
      }else{setAU(null);setUD(null);}
      setL(false);
    });
  },[]);

  const handleUser=u=>{
    if(u._showPin){setNewPin(u._pin);setShowPin(true);}
    setAU({uid:u.uid,displayName:u.displayName||u.name,role:u.role});
    setUD(u);
  };

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"13px",zIndex:1,position:"relative"}}>
      <div className="koni" style={{fontSize:"3.8rem"}}>🤖</div>
      <div className="logo">KAWN</div>
      <Sp s={28}/>
      <div className="mu sm">جاري التحميل...</div>
    </div>
  );

  if(showPin&&newPin&&authUser?.role==="student") return <PinScreen pin={newPin} name={authUser.displayName} onContinue={()=>setShowPin(false)}/>;

  return(
    !authUser?<AuthScreen onUser={handleUser}/>
    :authUser.role==="teacher"?<TeacherDashboard user={authUser}/>
    :<StudentDashboard user={authUser} userData={userData}/>
  );
}

const st=document.createElement("style");st.textContent=CSS;document.head.appendChild(st);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
