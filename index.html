// مكوّنات مشتركة
function Spin({s=28}){ return <div className="spin" style={{width:s,height:s}} />; }
function Toast({t}){ if(!t) return null; return <div className={`toast ${t.type==="error"?"err":""}`}>{t.msg}</div>; }
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,type="success")=>{ setT({msg,type}); setTimeout(()=>setT(null),3500); },[]);
  return {t,show};
}
function QR({value,size=190}){
  const ref=useRef();
  useEffect(()=>{ if(!value||!ref.current) return; ref.current.innerHTML=""; if(window.QRCode) new window.QRCode(ref.current,{text:value,width:size,height:size,colorDark:"#1a0533",colorLight:"#fff"}); },[value]);
  return <div ref={ref} style={{display:"inline-block"}} />;
}

// ══════════════════════════════════════════════════════
//  شاشة تسجيل الدخول — معلم + طالب بـ PIN
// ══════════════════════════════════════════════════════
function AuthScreen({onUser}){
  const [mode,setMode]=useState("login"); // login | register | join | pin
  const [f,setF]=useState({name:"",email:"",password:"",code:"",pin:""});
  const [loading,setL]=useState(false);
  const [err,setErr]=useState("");
  const set=k=>e=>setF(x=>({...x,[k]:e.target.value}));

  // تسجيل / دخول المعلم
  const teacherAuth=async()=>{
    setErr(""); setL(true);
    try{
      if(mode==="register"){
        const c=await auth.createUserWithEmailAndPassword(f.email,f.password);
        await c.user.updateProfile({displayName:f.name});
        await db.collection("users").doc(c.user.uid).set({name:f.name,email:f.email,role:"teacher",createdAt:FS.serverTimestamp()});
        onUser({uid:c.user.uid,displayName:f.name,role:"teacher"});
      } else {
        const c=await auth.signInWithEmailAndPassword(f.email,f.password);
        const snap=await db.collection("users").doc(c.user.uid).get();
        onUser({uid:c.user.uid,displayName:c.user.displayName,role:(snap.data()||{}).role||"teacher"});
      }
    } catch(e){ setErr(ERR_MAP[e.code]||e.message); }
    setL(false);
  };

  // انضمام طالب جديد برمز الفصل
  const studentJoin=async()=>{
    setErr(""); setL(true);
    try{
      if(!f.name.trim()||!f.code.trim()){ setErr("أدخل اسمك ورمز الفصل"); setL(false); return; }
      const snap=await db.collection("classrooms").where("code","==",f.code.toUpperCase()).get();
      if(snap.empty){ setErr("رمز الفصل غير صحيح"); setL(false); return; }
      const cls=snap.docs[0];
      const pin=genStudentPin();
      const email=`s_${Date.now()}@kawn.app`;
      const pwd="k"+Math.random().toString(36).slice(2,12);
      const c=await auth.createUserWithEmailAndPassword(email,pwd);
      await c.user.updateProfile({displayName:f.name});
      const sd={name:f.name,role:"student",email,password:pwd,pin,classId:cls.id,className:cls.data().name,teacherId:cls.data().teacherId,teacherName:cls.data().teacherName,level:"medium",points:0,joinedAt:FS.serverTimestamp()};
      await db.collection("users").doc(c.user.uid).set(sd);
      await db.collection("classrooms").doc(cls.id).collection("students").doc(c.user.uid).set({studentId:c.user.uid,name:f.name,level:"medium",points:0,joinedAt:FS.serverTimestamp()});
      // عرض الـ PIN للطالب
      onUser({uid:c.user.uid,displayName:f.name,role:"student",...sd,_showPin:true,_pin:pin});
    } catch(e){ setErr(e.message); }
    setL(false);
  };

  // دخول طالب موجود بـ PIN
  const studentPinLogin=async()=>{
    setErr(""); setL(true);
    try{
      if(!f.pin.trim()){ setErr("أدخل رمز الدخول"); setL(false); return; }
      const snap=await db.collection("users").where("pin","==",f.pin.trim()).where("role","==","student").get();
      if(snap.empty){ setErr("رمز الدخول غير صحيح"); setL(false); return; }
      const data=snap.docs[0].data();
      const uid=snap.docs[0].id;
      // دخول بالبريد والباسورد المحفوظين
      const c=await auth.signInWithEmailAndPassword(data.email,data.password);
      onUser({uid,displayName:data.name,role:"student",...data});
    } catch(e){ setErr("رمز الدخول غير صحيح"); }
    setL(false);
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",position:"relative",zIndex:1}}>
      <div style={{width:"100%",maxWidth:"400px"}}>
        <div className="tc mb16">
          <div className="koni" style={{fontSize:"4rem"}}>🤖</div>
          <div className="logo">KAWN</div>
          <div className="logo-sub">منصة كون التعليمية</div>
        </div>
        <div className="tabs mb16">
          <button className={`tab ${mode!=="join"&&mode!=="pin"?"active":""}`} onClick={()=>{setMode("login");setErr("");}}>👨‍🏫 معلم</button>
          <button className={`tab ${mode==="join"?"active":""}`} onClick={()=>{setMode("join");setErr("");}}>🎓 طالب جديد</button>
          <button className={`tab ${mode==="pin"?"active":""}`} onClick={()=>{setMode("pin");setErr("");}}>🔢 دخول بـ PIN</button>
        </div>
        <div className="card card-glow">
          {/* طالب جديد */}
          {mode==="join"&&<div className="flex fc g12">
            <div className="sec">🚀 انضم لفصلك</div>
            <input className="inp" placeholder="اسمك الكامل" value={f.name} onChange={set("name")} />
            <input className="inp" placeholder="رمز الفصل (من معلمك)" value={f.code} onChange={set("code")} style={{letterSpacing:"5px",textAlign:"center",fontSize:"1.2rem",fontWeight:900}} />
            {err&&<div className="red sm tc">{err}</div>}
            <button className="btn btn-cyan btn-full" onClick={studentJoin} disabled={loading}>{loading?<Spin s={18}/>:"🎮 انضم الآن"}</button>
            <div className="xs mut tc">سيُعطى لك رمز PIN احتفظ به للدخول لاحقاً</div>
          </div>}

          {/* دخول بـ PIN */}
          {mode==="pin"&&<div className="flex fc g12">
            <div className="sec">🔢 دخول بـ PIN</div>
            <input className="inp" placeholder="أدخل رمز الـ PIN المكون من 6 أرقام" value={f.pin} onChange={set("pin")} style={{letterSpacing:"6px",textAlign:"center",fontSize:"1.4rem",fontWeight:900}} maxLength={6} type="number" />
            {err&&<div className="red sm tc">{err}</div>}
            <button className="btn btn-gold btn-full" onClick={studentPinLogin} disabled={loading}>{loading?<Spin s={18}/>:"🚪 دخول"}</button>
          </div>}

          {/* معلم */}
          {(mode==="login"||mode==="register")&&<div>
            <div className="tabs mb16" style={{marginTop:0}}>
              <button className={`tab ${mode==="login"?"active":""}`} onClick={()=>setMode("login")}>دخول</button>
              <button className={`tab ${mode==="register"?"active":""}`} onClick={()=>setMode("register")}>تسجيل جديد</button>
            </div>
            <div className="flex fc g12">
              {mode==="register"&&<input className="inp" placeholder="اسمك الكامل" value={f.name} onChange={set("name")} />}
              <input className="inp" placeholder="البريد الإلكتروني" type="email" value={f.email} onChange={set("email")} dir="ltr" />
              <input className="inp" placeholder="كلمة المرور" type="password" value={f.password} onChange={set("password")} dir="ltr" />
              {err&&<div className="red sm tc">{err}</div>}
              <button className="btn btn-primary btn-full" onClick={teacherAuth} disabled={loading}>{loading?<Spin s={18}/>:mode==="login"?"🔑 دخول":"✨ إنشاء حساب"}</button>
            </div>
          </div>}
        </div>
        <div className="xs mut tc mt12">منصة كون © 2025 — أ. عمار العوض</div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  شاشة عرض PIN للطالب بعد التسجيل
// ══════════════════════════════════════════════════════
function PinScreen({pin,name,onContinue}){
  const [copied,setCopied]=useState(false);
  const copy=()=>{ navigator.clipboard?.writeText(pin); setCopied(true); setTimeout(()=>setCopied(false),2000); };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",zIndex:1,position:"relative"}}>
      <div style={{width:"100%",maxWidth:"400px"}}>
        <div className="card card-glow tc">
          <div style={{fontSize:"3rem"}}>🎉</div>
          <div className="black lg mt8">مرحباً {name}!</div>
          <div className="sm mut mt4">تم تسجيلك بنجاح. احتفظ بهذا الرمز</div>
          <div className="pin-box mt16">
            <div className="xs mut mb8">رمز دخولك الخاص (PIN)</div>
            <div className="pin-num">{pin}</div>
            <div className="xs mut mt8">استخدمه في كل مرة تدخل فيها المنصة</div>
          </div>
          <div className="flex g8 mt16" style={{justifyContent:"center"}}>
            <button className="btn btn-secondary btn-sm" onClick={copy}>{copied?"✅ تم النسخ":"📋 نسخ الرمز"}</button>
          </div>
          <div className="card mt16" style={{background:"rgba(239,68,68,.08)",borderColor:"#ef4444",padding:"12px"}}>
            <div className="sm bold red">⚠️ مهم جداً!</div>
            <div className="xs mut mt4">احفظ هذا الرمز في مكان آمن. بدونه لن تتمكن من الدخول مستقبلاً والاحتفاظ بنقاطك.</div>
          </div>
          <button className="btn btn-primary btn-full mt16" onClick={onContinue}>🚀 ابدأ رحلتك مع كوني</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  نموذج إضافة المحتوى — للمعلم
// ══════════════════════════════════════════════════════
function ContentForm({classId,onClose,show}){
  const [type,setType]=useState("post");
  const [f,setF]=useState({title:"",body:"",url:"",points:10,targetLevel:"all"});
  const [questions,setQ]=useState([{text:"",options:["","","",""],correct:0,points:5}]);
  const [loading,setL]=useState(false);
  const set=k=>e=>setF(x=>({...x,[k]:e.target.value}));
  const addQ=()=>setQ(q=>[...q,{text:"",options:["","","",""],correct:0,points:5}]);
  const upQ=(i,k,v)=>setQ(q=>q.map((x,j)=>j===i?{...x,[k]:v}:x));
  const upO=(qi,oi,v)=>setQ(q=>q.map((x,j)=>j===qi?{...x,options:x.options.map((o,k)=>k===oi?v:o)}:x));

  const submit=async()=>{
    if(!f.title.trim()){show("أدخل عنواناً","error");return;}
    setL(true);
    try{
      const tp=type==="homework"?questions.reduce((s,q)=>s+Number(q.points),0):Number(f.points);
      const data={type,title:f.title,body:f.body,targetLevel:f.targetLevel,totalPoints:tp,classId,createdAt:FS.serverTimestamp(),
        ...(type==="video"&&{url:f.url,videoId:getYtId(f.url)}),
        ...(type==="homework"&&{questions}),
        ...(type==="task"&&{points:Number(f.points)}),
      };
      await db.collection("classrooms").doc(classId).collection("content").add(data);
      show("تم نشر المحتوى ✅"); onClose();
    } catch(e){show(e.message,"error");}
    setL(false);
  };

  const TL={post:"📢 منشور",video:"🎬 فيديو",homework:"📝 واجب",task:"📋 مهمة"};
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="flex ac jb mb16"><div className="sec" style={{marginBottom:0}}>➕ إضافة محتوى</div><button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button></div>
        <div className="flex wrap g8 mb16">
          {Object.entries(TL).map(([k,v])=><button key={k} className={`btn btn-sm ${type===k?"btn-primary":"btn-secondary"}`} onClick={()=>setType(k)}>{v}</button>)}
        </div>
        <div className="flex fc g12">
          <input className="inp" placeholder="العنوان *" value={f.title} onChange={set("title")} />
          {type==="post"&&<textarea className="inp" placeholder="نص المنشور..." rows={4} value={f.body} onChange={set("body")} />}
          {type==="video"&&<>
            <input className="inp" placeholder="رابط يوتيوب..." value={f.url} onChange={set("url")} dir="ltr" />
            <div className="flex ac g8"><span className="sm mut">نقاط المشاهدة:</span><input className="inp" type="number" value={f.points} onChange={set("points")} style={{width:"75px"}} /></div>
            {f.url&&getYtId(f.url)&&<img src={`https://img.youtube.com/vi/${getYtId(f.url)}/hqdefault.jpg`} style={{width:"100%",borderRadius:"10px"}} alt="معاينة" />}
          </>}
          {type==="task"&&<>
            <textarea className="inp" placeholder="وصف المهمة الأدائية بالتفصيل..." rows={3} value={f.body} onChange={set("body")} />
            <div className="flex ac g8"><span className="sm mut">الدرجة الكاملة:</span><input className="inp" type="number" value={f.points} onChange={set("points")} style={{width:"75px"}} /></div>
            <div className="card sm" style={{background:"rgba(249,115,22,.08)",borderColor:C.orange,padding:"10px"}}>
              <span className="mut">💡 سيقوم الطالب برفع صورة المهمة وأنت تراجعها وتمنح النقاط</span>
            </div>
          </>}
          {type==="homework"&&<div>
            {questions.map((q,qi)=>(
              <div key={qi} className="card mb12" style={{padding:"13px",background:C.surfaceHigh}}>
                <div className="flex ac jb mb8">
                  <span className="sm bold acc">سؤال {qi+1}</span>
                  <div className="flex ac g8">
                    <span className="xs mut">الدرجة:</span>
                    <input className="inp" type="number" value={q.points} onChange={e=>upQ(qi,"points",Number(e.target.value))} style={{width:"55px",padding:"5px"}} />
                    {questions.length>1&&<button className="btn btn-red btn-sm" style={{padding:"4px 8px"}} onClick={()=>setQ(qs=>qs.filter((_,i)=>i!==qi))}>🗑</button>}
                  </div>
                </div>
                <input className="inp mb8" placeholder="نص السؤال..." value={q.text} onChange={e=>upQ(qi,"text",e.target.value)} />
                {q.options.map((opt,oi)=>(
                  <div key={oi} className="flex ac g8 mb4">
                    <input type="radio" name={`c_${qi}`} checked={q.correct===oi} onChange={()=>upQ(qi,"correct",oi)} style={{accentColor:C.green}} />
                    <input className="inp" placeholder={`الخيار ${oi+1}`} value={opt} onChange={e=>upO(qi,oi,e.target.value)} />
                  </div>
                ))}
              </div>
            ))}
            <button className="btn btn-secondary btn-sm wf" onClick={addQ}>+ إضافة سؤال</button>
            <div className="xs mut tc mt8">المجموع: {questions.reduce((s,q)=>s+Number(q.points),0)} درجة</div>
          </div>}
          <div>
            <div className="sm mut mb8">الفئة المستهدفة:</div>
            <div className="flex wrap g8">
              {[["all","🌐 الجميع"],["advanced","⭐ متقدم"],["medium","📘 متوسط"],["low","💪 مجتهد"]].map(([v,l])=>(
                <button key={v} className={`btn btn-sm ${f.targetLevel===v?"btn-primary":"btn-secondary"}`} onClick={()=>setF(x=>({...x,targetLevel:v}))}>{l}</button>
              ))}
            </div>
          </div>
          <button className="btn btn-primary btn-full" onClick={submit} disabled={loading}>{loading?<Spin s={18}/>:"🚀 نشر المحتوى"}</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  مراجعة المهام الأدائية — للمعلم
// ══════════════════════════════════════════════════════
function TaskReviewModal({classId,contentItem,students,onClose,show}){
  const [subs,setSubs]=useState([]);
  const [loading,setL]=useState(true);
  const [pts,setPts]=useState({});

  useEffect(()=>{
    (async()=>{
      const snap=await db.collection("classrooms").doc(classId).collection("submissions")
        .where("contentId","==",contentItem.id).where("type","==","task").get();
      setSubs(snap.docs.map(d=>({id:d.id,...d.data()})));
      setL(false);
    })();
  },[]);

  const approve=async(sub,points)=>{
    const p=Number(points)||0;
    await db.collection("classrooms").doc(classId).collection("submissions").doc(sub.id).update({status:"approved",score:p,reviewedAt:FS.serverTimestamp()});
    if(p>0){
      await db.collection("users").doc(sub.studentId).update({points:FS.increment(p)});
      await db.collection("classrooms").doc(classId).collection("students").doc(sub.studentId).update({points:FS.increment(p)});
    }
    setSubs(s=>s.map(x=>x.id===sub.id?{...x,status:"approved",score:p}:x));
    show(`✅ تم قبول المهمة ومنح ${p} نقطة`);
  };

  const reject=async(sub)=>{
    await db.collection("classrooms").doc(classId).collection("submissions").doc(sub.id).update({status:"rejected",reviewedAt:FS.serverTimestamp()});
    setSubs(s=>s.map(x=>x.id===sub.id?{...x,status:"rejected"}:x));
    show("تم رفض المهمة","error");
  };

  const getStudentName=sid=>{ const st=students.find(s=>s.studentId===sid||s.id===sid); return st?st.name:"طالب"; };
  const statusBadge={pending:"badge-pending",approved:"badge-approved",rejected:"badge-rejected"};
  const statusLabel={pending:"قيد المراجعة",approved:"مقبولة ✅",rejected:"مرفوضة ✕"};

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"580px"}}>
        <div className="flex ac jb mb16">
          <div className="sec" style={{marginBottom:0}}>📋 مراجعة: {contentItem.title}</div>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
        </div>
        {loading?<div className="flex jc" style={{padding:"32px"}}><Spin /></div>
        :subs.length===0?<div className="tc" style={{padding:"32px"}}><div style={{fontSize:"2.5rem"}}>📭</div><div className="bold mt12">لا توجد تسليمات بعد</div></div>
        :subs.map(sub=>(
          <div key={sub.id} className="task-sub-card">
            <div className="flex ac jb mb8">
              <div className="flex ac g8">
                <div className="avatar" style={{width:32,height:32,fontSize:".8rem"}}>{getStudentName(sub.studentId)[0]}</div>
                <div className="bold sm">{getStudentName(sub.studentId)}</div>
              </div>
              <span className={`badge ${statusBadge[sub.status]||"badge-pending"}`}>{statusLabel[sub.status]||"قيد المراجعة"}</span>
            </div>
            {sub.imageUrl&&<img src={sub.imageUrl} style={{width:"100%",borderRadius:"8px",marginBottom:"10px",maxHeight:"300px",objectFit:"contain"}} alt="المهمة" />}
            {sub.note&&<div className="sm mut mb8">💬 {sub.note}</div>}
            {(!sub.status||sub.status==="pending")&&(
              <div className="flex ac g8 mt8">
                <input className="inp" type="number" placeholder={`النقاط (أقصى ${contentItem.totalPoints||contentItem.points||10})`}
                  value={pts[sub.id]||""} onChange={e=>setPts(p=>({...p,[sub.id]:e.target.value}))} style={{flex:1}} />
                <button className="btn btn-green btn-sm" onClick={()=>approve(sub,pts[sub.id]||contentItem.totalPoints||contentItem.points||10)}>✅ قبول</button>
                <button className="btn btn-red btn-sm" onClick={()=>reject(sub)}>✕ رفض</button>
              </div>
            )}
            {sub.status==="approved"&&<div className="xs mut mt4">✅ منحت {sub.score} نقطة</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  كشف الدرجات
// ══════════════════════════════════════════════════════
function GradesSheet({classId,students,onClose}){
  const [subs,setSubs]=useState([]);
  const [content,setCont]=useState([]);
  const [loading,setL]=useState(true);
  const [editing,setEd]=useState(null);
  const [ev,setEv]=useState("");

  useEffect(()=>{
    (async()=>{
      const [cS,sS]=await Promise.all([
        db.collection("classrooms").doc(classId).collection("content").where("type","==","homework").get(),
        db.collection("classrooms").doc(classId).collection("submissions").get(),
      ]);
      setCont(cS.docs.map(d=>({id:d.id,...d.data()})));
      setSubs(sS.docs.map(d=>({id:d.id,...d.data()})));
      setL(false);
    })();
  },[]);

  const getScore=(sid,cid)=>{ const s=subs.find(x=>x.studentId===sid&&x.contentId===cid); return s?(s.score??s.pts??null):null; };
  const save=async(sid,cid)=>{
    const score=Number(ev);
    const ex=subs.find(x=>x.studentId===sid&&x.contentId===cid);
    if(ex){ await db.collection("classrooms").doc(classId).collection("submissions").doc(ex.id).update({score}); setSubs(s=>s.map(x=>x.id===ex.id?{...x,score}:x)); }
    else { const ref=await db.collection("classrooms").doc(classId).collection("submissions").add({studentId:sid,contentId:cid,score,manualEdit:true}); setSubs(s=>[...s,{id:ref.id,studentId:sid,contentId:cid,score}]); }
    setEd(null);
  };

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"700px"}}>
        <div className="flex ac jb mb16"><div className="sec" style={{marginBottom:0}}>📊 كشف الدرجات</div><button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button></div>
        {loading?<div className="flex jc" style={{padding:"32px"}}><Spin /></div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}}>
              <thead><tr>
                <th style={{padding:"9px",textAlign:"right",color:C.textMuted,borderBottom:`1px solid ${C.border}`,minWidth:"100px"}}>الطالب</th>
                {content.map(c=><th key={c.id} style={{padding:"9px",textAlign:"center",color:C.accentGlow,borderBottom:`1px solid ${C.border}`,minWidth:"80px"}}>{c.title}<br/><span style={{color:C.textMuted,fontWeight:400}}>/{c.totalPoints}</span></th>)}
                <th style={{padding:"9px",textAlign:"center",color:C.gold,borderBottom:`1px solid ${C.border}`}}>المجموع</th>
              </tr></thead>
              <tbody>{students.map(st=>{
                const sid=st.studentId||st.id;
                const total=content.reduce((s,c)=>s+(getScore(sid,c.id)??0),0);
                const mx=content.reduce((s,c)=>s+(c.totalPoints||0),0);
                return(<tr key={st.id}>
                  <td style={{padding:"9px",borderBottom:`1px solid ${C.border}`}}><div className="bold">{st.name}</div><div className="xs mut">{st.points||0} نقطة</div></td>
                  {content.map(c=>{ const score=getScore(sid,c.id); const ck=`${sid}_${c.id}`;
                    return(<td key={c.id} style={{padding:"9px",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>
                      {editing===ck?(<div className="flex ac g4" style={{justifyContent:"center"}}>
                        <input type="number" value={ev} onChange={e=>setEv(e.target.value)} style={{width:"50px",padding:"4px",background:C.surfaceHigh,border:`1px solid ${C.accent}`,borderRadius:"6px",color:C.text,fontFamily:"Cairo",textAlign:"center"}} />
                        <button className="btn btn-green btn-sm" style={{padding:"4px 8px"}} onClick={()=>save(sid,c.id)}>✓</button>
                      </div>):(
                        <div onClick={()=>{setEd(ck);setEv(score??"");}} style={{cursor:"pointer",padding:"5px 9px",borderRadius:"8px",background:score!==null?"rgba(16,185,129,.1)":C.surfaceHigh,color:score!==null?C.green:C.textMuted,fontWeight:700,display:"inline-block",minWidth:"36px"}}>{score!==null?score:"—"}</div>
                      )}
                    </td>);
                  })}
                  <td style={{padding:"9px",textAlign:"center",borderBottom:`1px solid ${C.border}`,fontWeight:900,color:C.gold}}>{total}/{mx}</td>
                </tr>);
              })}</tbody>
            </table>
            <div className="xs mut tc mt12">اضغط على أي خانة لتعديل الدرجة يدوياً</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
//  بطاقة المحتوى — للطالب
// ══════════════════════════════════════════════════════
function ContentCard({item,done,onDone,studentId,classId}){
  const [open,setOpen]=useState(false); // للمنشور: مفتوح/مغلق
  const [exp,setExp]=useState(false);
  const [ans,setAns]=useState({});
  const [sub,setSub]=useState(done);
  const [res,setRes]=useState(null);
  const [imgFile,setImgFile]=useState(null);
  const [imgPrev,setImgPrev]=useState(null);
  const [note,setNote]=useState("");
  const [uploading,setUpl]=useState(false);
  const [taskStatus,setTaskStatus]=useState(null); // pending/approved/rejected
  const fileRef=useRef();

  // جلب حالة المهمة الأدائية
  useEffect(()=>{
    if(item.type==="task"&&done){
      db.collection("classrooms").doc(classId).collection("submissions")
        .where("studentId","==",studentId).where("contentId","==",item.id).get()
        .then(s=>{ if(!s.empty) setTaskStatus(s.docs[0].data().status||"pending"); });
    }
  },[done]);

  const TI={post:"📢",video:"🎬",homework:"📝",task:"📋"};
  const TB={post:"badge-post",video:"badge-video",homework:"badge-hw",task:"badge-task"};
  const TL={post:"منشور",video:"فيديو",homework:"واجب",task:"مهمة"};

  const submitHW=()=>{
    let score=0;
    item.questions.forEach((q,i)=>{if(ans[i]===q.correct)score+=Number(q.points);});
    const total=item.questions.reduce((s,q)=>s+Number(q.points),0);
    setRes({score,total}); setSub(true);
    onDone(score,item.id,{score,contentId:item.id,type:"homework"});
  };

  const onImgChange=e=>{
    const file=e.target.files[0]; if(!file) return;
    setImgFile(file);
    const reader=new FileReader();
    reader.onload=ev=>setImgPrev(ev.target.result);
    reader.readAsDataURL(file);
  };

  const submitTask=async()=>{
    if(!imgFile){alert("يرجى اختيار صورة للمهمة");return;}
    setUpl(true);
    try{
      // رفع الصورة إلى Firebase Storage
      const path=`tasks/${classId}/${item.id}/${studentId}_${Date.now()}`;
      const ref=storage.ref(path);
      await ref.put(imgFile);
      const url=await ref.getDownloadURL();
      // حفظ التسليم
      await db.collection("classrooms").doc(classId).collection("submissions").add({
        studentId,contentId:item.id,type:"task",imageUrl:url,note,status:"pending",createdAt:FS.serverTimestamp()
      });
      setSub(true); setTaskStatus("pending");
      onDone(0,item.id,{type:"task",status:"pending"});
    } catch(e){ alert("حدث خطأ: "+e.message); }
    setUpl(false);
  };

  // ── المنشور: يُعرض ملخص فقط حتى يضغط الطالب
  if(item.type==="post"){
    return(
      <div className={`ccard ${!open?"ccard-collapsed":""}`} onClick={!open?()=>setOpen(true):undefined}>
        <div className="flex ac jb mb8">
          <span className="badge badge-post">📢 منشور</span>
          {!open&&<span className="xs mut">اضغط للقراءة 👆</span>}
          {open&&sub&&<span className="badge badge-approved">✅ مقروء</span>}
        </div>
        <div className="bold">{item.title}</div>
        {!open&&<div className="sm mut mt4" style={{filter:"blur(3px)",userSelect:"none"}}>● ● ● ● ● ● ● ● ● ●</div>}
        {open&&<>
          {item.body&&<div className="sm mt8" style={{lineHeight:1.8}}>{item.body}</div>}
          {!sub&&<button className="btn btn-secondary btn-sm mt12" onClick={()=>{setSub(true);onDone(0,item.id);}}>✅ تم القراءة</button>}
        </>}
      </div>
    );
  }

  return(
    <div className="ccard">
      <div className="flex ac jb mb8">
        <div className="flex wrap g8">
          <span className={`badge ${TB[item.type]}`}>{TI[item.type]} {TL[item.type]}</span>
          {sub&&item.type!=="task"&&<span className="badge badge-approved">✅ منجز</span>}
          {item.type==="task"&&taskStatus&&(
            <span className={`badge ${taskStatus==="approved"?"badge-approved":taskStatus==="rejected"?"badge-rejected":"badge-pending"}`}>
              {taskStatus==="approved"?"✅ مقبولة":taskStatus==="rejected"?"✕ مرفوضة":"⏳ قيد المراجعة"}
            </span>
          )}
        </div>
        <span className="pill">{item.totalPoints||item.points||0} درجة</span>
      </div>
      <div className="bold">{item.title}</div>
      {item.body&&<div className="sm mut mt4">{item.body}</div>}

      {/* فيديو */}
      {item.type==="video"&&(
        <div className="mt8">
          {!exp?<button className="btn btn-red btn-sm" onClick={()=>setExp(true)}>▶ شاهد الفيديو</button>
          :<>
            <iframe className="yt" src={`https://www.youtube.com/embed/${item.videoId}?autoplay=1`} allowFullScreen title={item.title} />
            {!sub&&<button className="btn btn-green btn-full mt8" onClick={()=>{setSub(true);onDone(item.totalPoints||item.points||10,item.id);}}>✅ انتهيت (+{item.totalPoints||item.points||10} نقطة)</button>}
          </>}
        </div>
      )}

      {/* واجب MCQ */}
      {item.type==="homework"&&(
        <div className="mt8">
          {!exp&&!sub&&<button className="btn btn-primary btn-sm" onClick={()=>setExp(true)}>📝 ابدأ الواجب</button>}
          {exp&&!sub&&<div>
            {item.questions?.map((q,qi)=>(
              <div key={qi} className="card mb12" style={{padding:"12px",background:C.surfaceHigh}}>
                <div className="bold sm mb8">{qi+1}. {q.text}</div>
                {q.options.map((opt,oi)=>(
                  <button key={oi} className={`opt-btn ${ans[qi]===oi?"sel":""}`} onClick={()=>setAns(a=>({...a,[qi]:oi}))}>
                    {["أ","ب","ج","د"][oi]}. {opt}
                  </button>
                ))}
              </div>
            ))}
            <button className="btn btn-primary btn-full" onClick={submitHW} disabled={Object.keys(ans).length<(item.questions?.length||0)}>✅ تسليم الواجب</button>
          </div>}
          {sub&&res&&<div className="card mt8 tc" style={{background:res.score>=res.total*.5?"rgba(16,185,129,.1)":"rgba(239,68,68,.08)"}}>
            <div style={{fontSize:"1.8rem"}}>{res.score>=res.total*.5?"🎉":"💪"}</div>
            <div className="black lg mt8">{res.score} / {res.total}</div>
            <div className="sm mut mt4">{res.score>=res.total*.8?"ممتاز!":res.score>=res.total*.5?"جيد، استمر!":"راجع الدرس وحاول مرة أخرى"}</div>
          </div>}
        </div>
      )}

      {/* مهمة أدائية — رفع صورة */}
      {item.type==="task"&&!sub&&(
        <div className="mt12">
          <div className="upload-area" onClick={()=>fileRef.current?.click()}>
            {imgPrev
              ?<img src={imgPrev} style={{maxWidth:"100%",maxHeight:"200px",borderRadius:"8px",objectFit:"contain"}} alt="المهمة" />
              :<div><div style={{fontSize:"2.5rem"}}>📷</div><div className="sm mut mt8">اضغط لاختيار صورة المهمة</div><div className="xs mut mt4">JPG, PNG مقبول</div></div>
            }
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={onImgChange} />
          </div>
          {imgPrev&&<button className="btn btn-secondary btn-sm mt8" onClick={()=>{setImgFile(null);setImgPrev(null);}}>🔄 تغيير الصورة</button>}
          <textarea className="inp mt8" placeholder="ملاحظة للمعلم (اختياري)..." rows={2} value={note} onChange={e=>setNote(e.target.value)} />
          <button className="btn btn-orange btn-full mt8" onClick={submitTask} disabled={uploading||!imgFile}>
            {uploading?<><Spin s={16}/> جاري الرفع...</>:"📤 رفع المهمة للمعلم"}
          </button>
        </div>
      )}
      {item.type==="task"&&sub&&taskStatus==="pending"&&(
        <div className="card mt8" style={{background:"rgba(245,158,11,.08)",borderColor:C.gold,padding:"12px"}}>
          <div className="sm bold gld">⏳ تم إرسال المهمة — في انتظار مراجعة المعلم</div>
          <div className="xs mut mt4">سيتم إضافة النقاط بعد مراجعة معلمك</div>
        </div>
      )}
      {item.type==="task"&&taskStatus==="approved"&&(
        <div className="card mt8" style={{background:"rgba(16,185,129,.08)",borderColor:C.green,padding:"12px"}}>
          <div className="sm bold grn">✅ تم قبول مهمتك ومنحك النقاط!</div>
        </div>
      )}
      {item.type==="task"&&taskStatus==="rejected"&&(
        <div className="card mt8" style={{background:"rgba(239,68,68,.08)",borderColor:C.red,padding:"12px"}}>
          <div className="sm bold red">✕ تم رفض المهمة — راجع معلمك</div>
        </div>
      )}
    </div>
  );
}

function ClassroomView({cls,user,onBack,show}){
  const [tab,setTab]=useState("content");
  const [students,setSt]=useState([]);
  const [content,setCont]=useState([]);
  const [loading,setL]=useState(true);
  const [showForm,setSF]=useState(false);
  const [showGrades,setSG]=useState(false);
  const [reviewItem,setReview]=useState(null);

  useEffect(()=>{
    (async()=>{
      const [sS,cS]=await Promise.all([
        db.collection("classrooms").doc(cls.id).collection("students").get(),
        db.collection("classrooms").doc(cls.id).collection("content").orderBy("createdAt","desc").get(),
      ]);
      setSt(sS.docs.map(d=>({id:d.id,...d.data()})));
      setCont(cS.docs.map(d=>({id:d.id,...d.data()})));
      setL(false);
    })();
  },[]);

  const delCont=async id=>{
    if(!confirm("حذف هذا المحتوى؟")) return;
    await db.collection("classrooms").doc(cls.id).collection("content").doc(id).delete();
    setCont(c=>c.filter(x=>x.id!==id)); show("تم الحذف");
  };

  const setLevel=async(sid,level)=>{
    await db.collection("classrooms").doc(cls.id).collection("students").doc(sid).update({level});
    setSt(s=>s.map(st=>st.id===sid?{...st,level}:st)); show("تم تحديث المستوى ✅");
  };

  const reloadCont=async()=>{
    setSF(false);
    const s=await db.collection("classrooms").doc(cls.id).collection("content").orderBy("createdAt","desc").get();
    setCont(s.docs.map(d=>({id:d.id,...d.data()})));
  };

  const TI={post:"📢",video:"🎬",homework:"📝",task:"📋"};
  const TB={post:"badge-post",video:"badge-video",homework:"badge-hw",task:"badge-task"};
  const TL2={post:"منشور",video:"فيديو",homework:"واجب",task:"مهمة أدائية"};
  const LL={all:"الجميع",advanced:"متقدم ⭐",medium:"متوسط 📘",low:"مجتهد 💪"};

  return(<>
    <nav className="nav">
      <button className="btn btn-secondary btn-sm" onClick={onBack}>← رجوع</button>
      <div className="tc"><div className="black">{cls.name}</div><div className="xs mut">{cls.subject}</div></div>
      <div className="code-text" style={{fontSize:"1rem",letterSpacing:"4px"}}>{cls.code}</div>
    </nav>
    <div className="page">
      <div className="tabs mb16">
        {[["content","📚","المحتوى"],["students","👥","الطلاب"],["qr","📱","QR"]].map(([k,ic,lb])=>(
          <button key={k} className={`tab ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{ic} {lb}</button>
        ))}
      </div>

      {tab==="content"&&<div>
        <div className="flex ac jb mb16">
          <div className="sec" style={{marginBottom:0}}>📚 محتوى الفصل</div>
          <div className="flex g8">
            <button className="btn btn-secondary btn-sm" onClick={()=>setSG(true)}>📊 الدرجات</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setSF(true)}>+ إضافة</button>
          </div>
        </div>
        {loading?<div className="flex jc" style={{padding:"32px"}}><Spin /></div>
        :content.length===0?<div className="card tc" style={{padding:"36px"}}><div style={{fontSize:"2.5rem"}}>📭</div><div className="bold mt12">لا يوجد محتوى بعد</div><button className="btn btn-primary mt16" onClick={()=>setSF(true)}>+ إضافة أول محتوى</button></div>
        :content.map(item=>(
          <div key={item.id} className="ccard">
            <div className="flex ac jb mb8">
              <div className="flex wrap g8">
                <span className={`badge ${TB[item.type]}`}>{TI[item.type]} {TL2[item.type]}</span>
                <span className="badge" style={{background:"rgba(255,255,255,.05)",color:C.textMuted}}>🎯 {LL[item.targetLevel]||"الجميع"}</span>
              </div>
              <div className="flex g8 ac">
                {item.type==="task"&&<button className="btn btn-orange btn-sm" onClick={()=>setReview(item)}>👁 مراجعة</button>}
                <span className="pill">{item.totalPoints||item.points||0} درجة</span>
                <button className="btn btn-red btn-sm" style={{padding:"4px 9px"}} onClick={()=>delCont(item.id)}>🗑</button>
              </div>
            </div>
            <div className="bold">{item.title}</div>
            {item.body&&<div className="sm mut mt4">{item.body}</div>}
            {item.type==="video"&&item.videoId&&<img src={`https://img.youtube.com/vi/${item.videoId}/hqdefault.jpg`} style={{width:"100%",borderRadius:"10px",marginTop:"10px"}} alt="thumb" />}
            {item.type==="homework"&&<div className="xs mut mt8">{item.questions?.length||0} سؤال</div>}
          </div>
        ))}
      </div>}

      {tab==="students"&&<div>
        <div className="flex ac jb mb16">
          <div className="sec" style={{marginBottom:0}}>👥 الطلاب</div>
          <span className="badge badge-student">{students.length} طالب</span>
        </div>
        {students.length===0?<div className="card tc" style={{padding:"32px"}}><div style={{fontSize:"2.5rem"}}>📭</div><div className="bold mt12">لم ينضم طلاب بعد</div><div className="sm mut mt8">رمز الفصل: <strong>{cls.code}</strong></div></div>
        :<div>
          <div className="flex wrap g8 mb16">
            {Object.entries(LEVELS).map(([k,v])=><span key={k} className={`badge ${v.cls}`}>{v.icon} {v.label}: {students.filter(s=>s.level===k).length}</span>)}
          </div>
          {students.map(st=>(
            <div key={st.id} className="student-row">
              <div className="avatar">{(st.name||"?")[0]}</div>
              <div style={{flex:1}}><div className="bold">{st.name}</div><div className="xs mut">{st.points||0} نقطة 🏆</div></div>
              <div className="flex wrap g4">
                {[["advanced","adv","⭐"],["medium","med","📘"],["low","low","💪"]].map(([k,c,ic])=>(
                  <button key={k} className={`lvl-btn ${st.level===k?c:""}`} onClick={()=>setLevel(st.id,k)}>{ic} {LEVELS[k].label}</button>
                ))}
              </div>
            </div>
          ))}
        </div>}
      </div>}

      {tab==="qr"&&<div className="tc">
        <div className="card card-glow" style={{display:"inline-block",padding:"28px"}}>
          <div className="sec" style={{justifyContent:"center"}}>📱 امسح للانضمام</div>
          <QR value={`رمز الفصل: ${cls.code}`} size={200} />
          <div className="code-text mt12">{cls.code}</div>
          <div className="sm mut mt8">اعرضه على شاشة الفصل</div>
        </div>
      </div>}
    </div>
    {showForm&&<ContentForm classId={cls.id} onClose={reloadCont} show={show} />}
    {showGrades&&<GradesSheet classId={cls.id} students={students} onClose={()=>setSG(false)} />}
    {reviewItem&&<TaskReviewModal classId={cls.id} contentItem={reviewItem} students={students} onClose={()=>setReview(null)} show={show} />}
  </>);
}

function TeacherDashboard({user}){
  const [classes,setCls]=useState([]);
  const [loading,setL]=useState(true);
  const [view,setView]=useState("home");
  const [active,setActive]=useState(null);
  const {t,show}=useToast();

  useEffect(()=>{loadCls();},[]);
  const loadCls=async()=>{ setL(true); const s=await db.collection("classrooms").where("teacherId","==",user.uid).get(); setCls(s.docs.map(d=>({id:d.id,...d.data()}))); setL(false); };
  const createCls=async(name,subject,grade)=>{
    const code=genCode();
    const data={name,subject,grade,code,teacherId:user.uid,teacherName:user.displayName||"المعلم",createdAt:FS.serverTimestamp(),studentCount:0};
    const ref=await db.collection("classrooms").add(data);
    const nc={id:ref.id,...data}; setCls(c=>[...c,nc]); setActive(nc); setView("class"); show("تم إنشاء الفصل 🎉");

  return(<>
    <nav className="nav">
      <div className="flex ac g12"><div className="logo" style={{fontSize:"1.4rem"}}>KAWN</div><span className="badge badge-teacher">👨‍🏫 معلم</span></div>

    </nav>
    <div className="page">
      <div className="flex ac jb mb16">
        <div><div style={{fontSize:"1.4rem",fontWeight:900}}>أهلاً، {user.displayName||"أستاذ"} 👋</div><div className="mut sm mt4">إدارة فصولك الدراسية</div></div>
        <button className="btn btn-primary" onClick={()=>setView("create")}>+ فصل جديد</button>
      </div>
      <div className="g3 mb16">
        <div className="stat"><div className="stat-num acc">{classes.length}</div><div className="stat-lbl">فصل دراسي</div></div>
        <div className="stat"><div className="stat-num cy">{classes.reduce((s,c)=>s+(c.studentCount||0),0)}</div><div className="stat-lbl">طالب</div></div>
        <div className="stat"><div className="stat-num">🤖</div><div className="stat-lbl">كوني</div></div>
      </div>
      <div className="sec">🏫 فصولي الدراسية</div>
      {loading?<div className="flex jc" style={{padding:"36px"}}><Spin /></div>

      :classes.map(c=>(
        <div key={c.id} className="class-card" onClick={()=>{setActive(c);setView("class");}}>
          <div className="flex ac jb">
            <div><div className="black lg">{c.name}</div><div className="mut sm mt4">{c.subject} · {c.grade}</div></div>
            <div className="flex fc ac g4"><div className="code-text" style={{fontSize:"1.2rem",letterSpacing:"5px"}}>{c.code}</div><div className="xs mut">{c.studentCount||0} طالب</div></div>
          </div>

    <Toast t={t} />
  </>);

function StudentDashboard({user,userData}){
  const [tab,setTab]=useState("feed");
  const [content,setCont]=useState([]);
  const [loading,setL]=useState(true);
  const [points,setPts]=useState(userData?.points||0);
  const [done,setDone]=useState(new Set());
  const [lb,setLb]=useState([]);
  const {t,show}=useToast();
  const classId=userData?.classId;
  const level=userData?.level||"medium";

  useEffect(()=>{
    if(!classId) return;
    (async()=>{
      const [cS,sS,lS]=await Promise.all([
        db.collection("classrooms").doc(classId).collection("content").orderBy("createdAt","desc").get(),
        db.collection("classrooms").doc(classId).collection("submissions").where("studentId","==",user.uid).get(),
        db.collection("classrooms").doc(classId).collection("students").get(),
      ]);
      const all=cS.docs.map(d=>({id:d.id,...d.data()}));
      setCont(all.filter(c=>c.targetLevel==="all"||c.targetLevel===level));
      setDone(new Set(sS.docs.map(d=>d.data().contentId)));
      setLb(lS.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.points||0)-(a.points||0)));
      setL(false);
    })();
  },[classId]);

  const onDone=async(pts,contentId,extra={})=>{
    if(extra.type==="task") return; // المهام الأدائية تُدار بشكل منفصل
    if(done.has(contentId)) return;
    setDone(s=>new Set([...s,contentId]));
    if(pts>0){setPts(p=>p+pts);show(`+${pts} نقطة 🎉`);}
    await db.collection("classrooms").doc(classId).collection("submissions").add({studentId:user.uid,contentId,pts,createdAt:FS.serverTimestamp(),...extra});
    if(pts>0){
      await db.collection("users").doc(user.uid).update({points:FS.increment(pts)});
      await db.collection("classrooms").doc(classId).collection("students").doc(user.uid).update({points:FS.increment(pts)});
    }
  };

  const kS=points<50?"🤖":points<150?"🦾":points<300?"🚀":"👾";
  const kN=points<50?"بذرة":points<150?"ناشئ":points<300?"بطل":"أسطورة";

  return(<>
    <nav className="nav">
      <div className="flex ac g8"><div className="logo" style={{fontSize:"1.4rem"}}>KAWN</div><span className="badge badge-student">🎓</span></div>
      <div className="flex ac g8"><span className="pill">{points} ⭐</span><button className="btn btn-secondary btn-sm" onClick={()=>auth.signOut()}>خروج</button></div>
    </nav>
    <div className="page">
      <div className="card card-glow tc mb16" style={{padding:"18px"}}>
        <div className="flex ac jb">
          <div style={{textAlign:"right"}}>
            <div className="black">كوني — <span className="acc">{kN}</span></div>
            <div className="xs mut mt4">{userData?.className}</div>
            <span className={`badge mt8 ${LEVELS[level]?.cls}`}>{LEVELS[level]?.icon} {LEVELS[level]?.label}</span>
          </div>
          <div className="koni" style={{fontSize:"3.2rem"}}>{kS}</div>
        </div>
        <div className="pbar mt12"><div className="pfill" style={{width:`${Math.min((points%100),100)}%`}} /></div>
        <div className="flex jb mt4"><span className="xs mut">{points%100}/100</span><span className="xs gld">{points} نقطة إجمالي</span></div>
      </div>

      <div className="tabs mb16">
        {[["feed","📚","المحتوى"],["leaderboard","🏆","المتصدرون"]].map(([k,ic,lb2])=>(
          <button key={k} className={`tab ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{ic} {lb2}</button>
        ))}
      </div>

      {tab==="feed"&&(loading?<div className="flex jc" style={{padding:"36px"}}><Spin /></div>
        :content.length===0?<div className="card tc" style={{padding:"36px"}}><div style={{fontSize:"2.5rem"}}>📭</div><div className="bold mt12">لا يوجد محتوى بعد</div><div className="sm mut mt8">انتظر معلمك</div></div>
        :content.map(item=><ContentCard key={item.id} item={item} done={done.has(item.id)} onDone={onDone} studentId={user.uid} classId={classId} />)
      )}

      {tab==="leaderboard"&&<div>
        <div className="sec">🏆 لوحة المتصدرين</div>
        {lb.map((s,i)=>(
          <div key={s.id} className={`lb-row ${s.studentId===user.uid||s.id===user.uid?"lb-me":"lb-o"}`}>
            <div style={{fontSize:i<3?"1.3rem":"1rem",minWidth:"25px",textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}</div>
            <div className="avatar" style={{width:30,height:30,fontSize:".78rem"}}>{(s.name||"?")[0]}</div>
            <div style={{flex:1}}><div className="bold sm">{s.name}{(s.studentId===user.uid||s.id===user.uid)?" (أنت)":""}</div></div>
            <div className="gld bold">{s.points||0} ⭐</div>
          </div>
        ))}
      </div>}
    </div>
    <Toast t={t} />
  </>);
}

// ══════════════════════════════════════════════════════
//  التطبيق الرئيسي

function App(){
  const [authUser,setAU]=useState(null);
  const [userData,setUD]=useState(null);
  const [loading,setL]=useState(true);
  const [showPin,setShowPin]=useState(false);
  const [newPin,setNewPin]=useState(null);

  useEffect(()=>{
    return auth.onAuthStateChanged(async u=>{
      if(u){
        try{
          const snap=await db.collection("users").doc(u.uid).get();
          const data=snap.data()||{};
          setUD(data);
          setAU({uid:u.uid,displayName:u.displayName||data.name,role:data.role||"teacher"});
        } catch{ setAU({uid:u.uid,displayName:u.displayName,role:"teacher"}); }
      } else { setAU(null); setUD(null); }
      setL(false);
    });
  },[]);

  const handleUser=u=>{
    if(u._showPin){ setNewPin(u._pin); setShowPin(true); }
    setAU({uid:u.uid,displayName:u.displayName,role:u.role});
    setUD(u);
  };

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"14px",position:"relative",zIndex:1}}>
      <div className="koni" style={{fontSize:"4rem"}}>🤖</div>
      <div className="logo">KAWN</div>
      <Spin s={30} />
      <div className="mut sm">جاري التحميل...</div>
    </div>
  );

  // عرض شاشة PIN بعد تسجيل طالب جديد
  if(showPin&&newPin&&authUser?.role==="student") return <PinScreen pin={newPin} name={authUser.displayName} onContinue={()=>setShowPin(false)} />;

  return(
    !authUser?<AuthScreen onUser={handleUser} />
    :authUser.role==="teacher"?<TeacherDashboard user={authUser} />
    :<StudentDashboard user={authUser} userData={userData} />
  );
}

// تطبيق CSS
const styleEl=document.createElement("style");
styleEl.textContent=CSS;
document.head.appendChild(styleEl);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
